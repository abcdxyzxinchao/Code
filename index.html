<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spck Workspace Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root {
            /* Điều chỉnh độ sáng tối sâu chuẩn màu Spck như ảnh 1 */
            --bg-dark: #07090e;
            --sidebar-bg: #0b111e;
            --editor-bg: #0d1222;
            --top-bar-bg: #090d18;
            --tab-active: #0d1222;
            --tab-inactive: #05080f;
            --accent-color: #3b82f6;
            --text-main: #ffffff;
            --text-muted: #64748b;
            --border-color: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100dvh;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            position: fixed;
        }

        .app-container {
            width: 100vw;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* 1. THANH MENU TRÊN CÙNG */
        .top-nav {
            height: 48px;
            background-color: var(--top-bar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 10;
        }

        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-icon {
            font-size: 18px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }
        .nav-icon:hover, .nav-icon.active { color: var(--text-main); }
        
        .btn-run {
            color: #10b981;
            font-size: 20px;
            cursor: pointer;
        }

        /* 2. THÂN ỨNG DỤNG */
        .main-content {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
            height: calc(100dvh - 48px);
        }

        /* SIDEBAR FILE MENU */
        .sidebar {
            width: 250px;
            min-width: 250px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: margin-left 0.25s ease-in-out;
        }

        .sidebar.collapsed {
            margin-left: -250px;
        }

        .sidebar-header {
            padding: 14px 16px;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .file-actions {
            display: flex;
            gap: 14px;
            font-size: 14px;
        }
        .file-actions i { cursor: pointer; color: var(--text-muted); }
        .file-actions i:hover { color: var(--text-main); }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .tree-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            font-size: 14px;
            cursor: pointer;
            color: #cbd5e1;
        }
        .tree-item:hover, .tree-item.active {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
        }
        
        .tree-item-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tree-item .item-icon { width: 16px; text-align: center; }
        .tree-item .fa-ellipsis-vertical {
            color: var(--text-muted);
            padding: 4px 8px;
        }
        .tree-item .fa-ellipsis-vertical:hover { color: #fff; }
        
        /* Đắp màu icon ngôn ngữ */
        .fa-folder { color: #f59e0b; }
        .fa-java { color: #ea2d2e; }
        .fa-html5 { color: #e34c26; }
        .fa-js { color: #f7df1e; }
        .fa-php { color: #777bb4; }
        .fa-css3-alt { color: #2196f3; }
        .fa-file-lines { color: #94a3b8; }

        /* VÙNG CHỨA EDITOR BÊN PHẢI */
        .editor-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--editor-bg);
            overflow: hidden;
            position: relative;
        }

        /* 3. KHOẢNG TRỐNG TRÊN ĐẦU CHỨA CÁC FILE ĐANG MỞ */
        .tabs-bar {
            height: 38px;
            background-color: var(--tab-inactive);
            display: flex;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
        }
        .tabs-bar::-webkit-scrollbar { display: none; }

        .tab-item {
            height: 100%;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            background-color: var(--tab-inactive);
            border-right: 1px solid var(--border-color);
            cursor: pointer;
            white-space: nowrap;
        }
        .tab-item.active {
            background-color: var(--tab-active);
            color: var(--text-main);
            border-bottom: 2px solid var(--accent-color);
        }

        .editor-container-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
        }
        #editor-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
        }

        /* MENU TÙY CHỌN CHO TỪNG FILE ĐỘC LẬP (ẢNH 3) */
        .file-context-menu {
            position: absolute;
            background-color: #111625;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            width: 160px;
            z-index: 999;
            padding: 4px 0;
        }
        .context-menu-item {
            padding: 10px 14px;
            font-size: 13px;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .context-menu-item:hover {
            background-color: var(--accent-color);
            color: white;
        }

        /* POPUP MENU KHI CHẠM GIỮ CODE */
        .custom-context-menu {
            position: absolute;
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: none;
            z-index: 1000;
            padding: 4px;
        }
        .menu-btn {
            background: none; border: none; color: white;
            padding: 6px 12px; font-size: 12px; cursor: pointer;
        }
        .menu-btn:hover { background-color: var(--accent-color); }

        /* PANEL HIỂN THỊ CHẠY KẾT QUẢ KHÔNG REFRESH TRANG (ẢNH 2) */
        .output-panel {
            position: absolute;
            top: 0; right: -100%;
            width: 100%; height: 100%;
            background-color: #000; z-index: 100;
            transition: right 0.25s cubic-bezier(0.075, 0.82, 0.165, 1);
            display: flex; flex-direction: column;
        }
        .output-panel.open { right: 0; }
        .output-header {
            height: 48px; background: var(--top-bar-bg);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; border-bottom: 1px solid var(--border-color);
        }
        .output-body { flex: 1; position: relative; background-color: #fff; }
        #preview-iframe { width: 100%; height: 100%; border: none; background: #fff; }
        #terminal-box { width: 100%; height: 100%; padding: 16px; font-family: monospace; color: #00ff00; background: #000; overflow-y: auto; white-space: pre-wrap; display: none; }

        /* TRẠNG THÁI TRỐNG CHƯA CÓ FILE */
        .empty-screen-msg {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            pointer-events: none;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="top-nav">
            <div class="nav-left">
                <i class="fa-solid fa-bars nav-icon active" id="btn-toggle-menu"></i>
                <i class="fa-solid fa-folder nav-icon"></i>
                <i class="fa-solid fa-code nav-icon"></i>
            </div>
            <div class="nav-right">
                <i class="fa-solid fa-file-zipper nav-icon" id="btn-export-project" title="Xuất toàn bộ Project (ZIP)"></i>
                <i class="fa-solid fa-play btn-run" id="btn-run-code"></i>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar" id="sidebar-menu">
                <div class="sidebar-header">
                    <span>FILES</span>
                    <div class="file-actions">
                        <i class="fa-solid fa-file-circle-plus" id="new-file-trigger"></i>
                        <i class="fa-solid fa-folder-plus" id="new-folder-trigger"></i>
                    </div>
                </div>
                
                <div class="file-tree" id="file-tree-container"></div>
            </div>

            <div class="editor-zone">
                <div class="tabs-bar" id="tabs-container"></div>

                <div class="editor-container-wrapper">
                    <div id="editor-container"></div>
                    <div class="empty-screen-msg" id="empty-msg">
                        Không có file nào đang mở.<br>Hãy nhấn biểu tượng tạo file bên trái để bắt đầu.
                    </div>
                </div>

                <div class="custom-context-menu" id="context-popup">
                    <button class="menu-btn" onclick="execAction('all')">Select All</button>
                    <button class="menu-btn" onclick="execAction('copy')">Copy</button>
                    <button class="menu-btn" onclick="execAction('paste')">Paste</button>
                </div>
            </div>

            <div class="output-panel" id="output-screen">
                <div class="output-header">
                    <span id="output-type">Live Preview</span>
                    <button style="background:none; border:none; color:white; font-size:14px; cursor:pointer;" id="btn-close-output">✕ ĐÓNG</button>
                </div>
                <div class="output-body">
                    <iframe id="preview-iframe"></iframe>
                    <div id="terminal-box"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="file-context-menu" id="file-interaction-menu">
        <div class="context-menu-item" id="opt-export-single"><i class="fa-solid fa-download"></i> Export File</div>
        <div class="context-menu-item" id="opt-rename-file"><i class="fa-solid fa-pen"></i> Rename</div>
        <div class="context-menu-item" id="opt-delete-file" style="color:#ff453a;"><i class="fa-solid fa-trash"></i> Delete</div>
    </div>

    <script>
        let editor;
        let filesData = {}; // KHỞI TẠO TRỐNG HOÀN TOÀN THEO YÊU CẦU CỦA BẠN
        let openedTabs = [];
        let activeFile = null;
        let targetMenuFile = null; // Ghi nhớ file đang tương tác trên Menu ba chấm
        let virtualFolderStr = ""; // Lưu tên thư mục ảo nếu người dùng tạo

        const langMapping = { 'html': 'html', 'css': 'css', 'js': 'javascript', 'java': 'java', 'php': 'php' };

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: '',
                language: 'plaintext',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 15,
                renderIndentGuides: true,
                minimap: { enabled: false }
            });

            updateEditorVisibility();
            setupLongPressMenu();
        });

        // TÍNH NĂNG 1: ẨN/HIỆN SIDEBAR GIỮ FULL MÀN HÌNH KHÔNG VỠ KHUNG
        document.getElementById('btn-toggle-menu').addEventListener('click', function() {
            const sidebar = document.getElementById('sidebar-menu');
            sidebar.classList.toggle('collapsed');
            setTimeout(() => { if(editor) editor.layout(); }, 260);
        });

        // ĐIỀU CHỈNH TRẠNG THÁI HIỂN THỊ EDITOR KHI CHƯA CÓ FILE
        function updateEditorVisibility() {
            const msg = document.getElementById('empty-msg');
            if(!activeFile) {
                msg.style.display = 'block';
                if(editor) editor.getContainerNode().style.opacity = '0';
            } else {
                msg.style.display = 'none';
                if(editor) editor.getContainerNode().style.opacity = '1';
            }
        }

        // TẠO FILE MỚI ĐỘNG KHÔNG LỖI LOGIC
        document.getElementById('new-file-trigger').addEventListener('click', function() {
            const name = prompt("Nhập tên file mới kèm đuôi mở rộng (Ví dụ: index.html, babs.java):");
            if(!name) return;
            if(filesData[name] !== undefined) return alert("File này đã tồn tại!");

            filesData[name] = name.endsWith('.html') ? `\n<h1>Giao diện Spck</h1>` : `// Code cho file ${name}\n`;
            renderFileTree();
            openFile(name);
        });

        // TẠO THƯ MỤC MỚI ĐỘNG
        document.getElementById('new-folder-trigger').addEventListener('click', function() {
            const folderName = prompt("Nhập tên thư mục mới:");
            if(!folderName) return;
            virtualFolderStr = folderName;
            renderFileTree();
        });

        // XỬ LÝ ĐỒNG BỘ CÂY THƯ MỤC LÊN GIAO DIỆN
        function renderFileTree() {
            const container = document.getElementById('file-tree-container');
            container.innerHTML = '';

            // Nếu người dùng có tạo thư mục, render hàng thư mục cha lên trước
            if(virtualFolderStr) {
                const folderRow = document.createElement('div');
                folderRow.className = "tree-item";
                folderRow.innerHTML = `<div class="tree-item-left"><i class="fa-solid fa-folder item-icon"></i> <strong style="color:#f59e0b;">${virtualFolderStr}</strong></div>`;
                container.appendChild(folderRow);
            }

            // Duyệt hiển thị danh sách file ảo
            Object.keys(filesData).forEach(fileName => {
                const ext = fileName.split('.').pop().toLowerCase();
                let iconClass = "fa-solid fa-file-lines";
                if(ext === 'html') iconClass = "fa-brands fa-html5";
                else if(ext === 'js') iconClass = "fa-brands fa-js";
                else if(ext === 'css') iconClass = "fa-brands fa-css3-alt";
                else if(ext === 'java') iconClass = "fa-brands fa-java";
                else if(ext === 'php') iconClass = "fa-brands fa-php";

                const fileRow = document.createElement('div');
                fileRow.className = `tree-item ${fileName === activeFile ? 'active' : ''}`;
                
                // Set thụt lề nếu có thư mục cha nhằm tạo cấu trúc hình cây ngăn nắp
                if(virtualFolderStr) fileRow.style.paddingLeft = "28px";

                fileRow.innerHTML = `
                    <div class="tree-item-left" onclick="openFile('${fileName}')">
                        <i class="${iconClass} item-icon"></i>
                        <span>${fileName}</span>
                    </div>
                    <i class="fa-solid fa-ellipsis-vertical" onclick="triggerFileMenu(event, '${fileName}')"></i>
                `;
                container.appendChild(fileRow);
            });

            updateEditorVisibility();
        }

        // MỞ FILE VÀ THAY ĐỔI TAB TRÊN ĐẦU NHANH CHÓNG
        function openFile(fileName) {
            if(activeFile && editor) {
                filesData[activeFile] = editor.getValue(); // Lưu lại tiến trình cũ trước khi nhảy tab
            }

            activeFile = fileName;
            if(!openedTabs.includes(fileName)) {
                openedTabs.push(fileName);
            }

            const ext = fileName.split('.').pop().toLowerCase();
            editor.setValue(filesData[fileName]);
            monaco.editor.setModelLanguage(editor.getModel(), langMapping[ext] || 'plaintext');

            renderTabs();
            renderFileTree();
        }

        // TÍNH NĂNG 2: VẼ VÀ ĐIỀU KHIỂN CÁC TÊN NGÔN NGỮ ĐANG MỞ TRÊN ĐẦU (TABS)
        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';

            openedTabs.forEach(fileName => {
                const tab = document.createElement('div');
                tab.className = `tab-item ${fileName === activeFile ? 'active' : ''}`;
                tab.innerHTML = `<span>${fileName}</span>`;
                tab.onclick = () => openFile(fileName);
                container.appendChild(tab);
            });
        }

        // TÍNH NĂNG 3: BẬT MENU BA CHẤM ĐỘC LẬP CHO TỪNG FILE (ẢNH 3)
        function triggerFileMenu(e, fileName) {
            e.stopPropagation();
            targetMenuFile = fileName;
            const menu = document.getElementById('file-interaction-menu');
            menu.style.display = 'flex';
            menu.style.left = (e.clientX - 140) + 'px';
            menu.style.top = e.clientY + 'px';
        }

        // Tự tắt menu khi nhấn ra ngoài
        document.addEventListener('click', function() {
            document.getElementById('file-interaction-menu').style.display = 'none';
        });

        /* --- XỬ LÝ LOGIC TRÊN MENU ẢNH 3 --- */
        // Xuất file đơn lẻ độc lập
        document.getElementById('opt-export-single').addEventListener('click', function() {
            if(!targetMenuFile) return;
            const blob = new Blob([filesData[targetMenuFile]], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = targetMenuFile;
            a.click();
        });

        // Đổi tên file (Rename)
        document.getElementById('opt-rename-file').addEventListener('click', function() {
            if(!targetMenuFile) return;
            const newName = prompt("Nhập tên mới cho file:", targetMenuFile);
            if(!newName || newName === targetMenuFile) return;

            filesData[newName] = filesData[targetMenuFile];
            delete filesData[targetMenuFile];

            if(activeFile === targetMenuFile) activeFile = newName;
            let idx = openedTabs.indexOf(targetMenuFile);
            if(idx !== -1) openedTabs[idx] = newName;

            renderFileTree();
            renderTabs();
        });

        // Xóa file (Delete)
        document.getElementById('opt-delete-file').addEventListener('click', function() {
            if(!targetMenuFile || !confirm(`Xác nhận xóa tệp tin ${targetMenuFile}?`)) return;

            delete filesData[targetMenuFile];
            openedTabs = openedTabs.filter(t => t !== targetMenuFile);

            if(activeFile === targetMenuFile) {
                activeFile = openedTabs.length > 0 ? openedTabs[0] : null;
            }

            if(activeFile) openFile(activeFile);
            else {
                renderFileTree();
                renderTabs();
            }
        });

        // XUẤT TOÀN BỘ PROJECT THƯ MỤC NÉN ĐẶT TÊN TÙY CHỈNH (ZIP)
        document.getElementById('btn-export-project').addEventListener('click', function() {
            if(Object.keys(filesData).length === 0) return alert("Thư mục rỗng, chưa có file nào để xuất!");
            
            const folderName = prompt("Nhập tên cho thư mục tổng của Project để xuất gói ZIP:", "MyProjectAI");
            if(!folderName) return;

            const zip = new JSZip();
            Object.keys(filesData).forEach(fileName => {
                // Đóng gói cấu trúc toàn bộ tệp tin vào trong thư mục mang tên người dùng đặt
                zip.file(`${folderName}/${fileName}`, filesData[fileName]);
            });

            zip.generateAsync({ type: 'blob' }).then(function(content) {
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${folderName}.zip`;
                a.click();
            });
        });

        // TÍNH NĂNG CHẠY CODE TRƯỢT MÀN HÌNH TẠI CHỖ (ẢNH 2)
        document.getElementById('btn-run-code').addEventListener('click', async function() {
            if(!activeFile) return alert("Vui lòng tạo hoặc mở một file để chạy!");

            if(editor) filesData[activeFile] = editor.getValue();

            const panel = document.getElementById('output-screen');
            const iframe = document.getElementById('preview-iframe');
            const terminal = document.getElementById('terminal-box');
            const typeText = document.getElementById('output-type');

            panel.classList.add('open');

            if(activeFile.endsWith('.html')) {
                typeText.innerText = "Browser Preview (HTML)";
                iframe.style.display = "block";
                terminal.style.display = "none";
                iframe.srcdoc = filesData[activeFile];
            } else {
                typeText.innerText = "Console Terminal Output";
                iframe.style.display = "none";
                terminal.style.display = "block";
                terminal.innerText = ">>> Đang kết nối máy chủ biên dịch trực tuyến thực thi...\n";

                let apiLang = "py"; let apiVer = "3.10.0";
                if(activeFile.endsWith('.js')) { apiLang = "js"; apiVer = "18.15.0"; }
                if(activeFile.endsWith('.java')) { apiLang = "java"; apiVer = "15.0.2"; }
                if(activeFile.endsWith('.php')) { apiLang = "php"; apiVer = "8.2.3"; }

                try {
                    const res = await fetch('https://emkc.org/api/v2/piston/execute', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            language: apiLang, version: apiVer,
                            files: [{ content: filesData[activeFile] }]
                        })
                    });
                    const data = await res.json();
                    if(data.run) {
                        terminal.innerText = data.run.stderr ? `[Lỗi cú pháp chương trình]:\n${data.run.stderr}` : data.run.stdout;
                    }
                } catch(e) {
                    terminal.innerText = "Lỗi đường truyền hệ thống.";
                }
            }
        });

        document.getElementById('btn-close-output').addEventListener('click', function() {
            document.getElementById('output-screen').classList.remove('open');
        });

        // CHẠM GIỮ / RIGHT CLICK TRÊN CODE ĐỂ COPY VÀ PASTE NHANH CHÓNG
        function setupLongPressMenu() {
            const area = document.getElementById('editor-container');
            const popup = document.getElementById('context-popup');

            area.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                popup.style.display = 'block';
                popup.style.left = e.clientX + 'px';
                popup.style.top = (e.clientY - 35) + 'px';
            });

            document.addEventListener('click', function(e) {
                if(!popup.contains(e.target)) popup.style.display = 'none';
            });
        }

        function execAction(type) {
            if(type === 'all') {
                editor.focus();
                editor.setSelection(editor.getModel().getFullModelRange());
            } else if(type === 'copy') {
                const txt = editor.getModel().getValueInRange(editor.getSelection());
                navigator.clipboard.writeText(txt);
            } else if(type === 'paste') {
                navigator.clipboard.readText().then(t => {
                    const sel = editor.getSelection();
                    const r = new monaco.Range(sel.startLineNumber, sel.startColumn, sel.endLineNumber, sel.endColumn);
                    editor.executeEdits("", [{ range: r, text: t }]);
                });
            }
            document.getElementById('context-popup').style.display = 'none';
        }
    </script>
</body>
</html>
