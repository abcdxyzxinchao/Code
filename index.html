<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spck Workspace Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: #111622;
            --editor-bg: #151b27;
            --top-bar-bg: #10141f;
            --tab-active: #151b27;
            --tab-inactive: #0e121a;
            --accent-color: #3b82f6;
            --text-main: #ffffff;
            --text-muted: #748194;
            --border-color: #1e2638;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100dvh;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            position: fixed;
        }

        /* CONTAINER CHÍNH CỦA APP */
        .app-container {
            width: 100vw;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* 1. THANH MENU TRÊN CÙNG (Top Navigation) */
        .top-nav {
            height: 48px;
            background-color: var(--top-bar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 10;
        }

        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-icon {
            font-size: 18px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }
        .nav-icon:hover, .nav-icon.active { color: var(--text-main); }
        
        .btn-run {
            color: #10b981;
            font-size: 20px;
            cursor: pointer;
        }

        /* 2. THÂN ỨNG DỤNG (CHỨA SIDEBAR VÀ EDITOR) */
        .main-content {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
            height: calc(100dvh - 48px);
        }

        /* SIDEBAR FILE MENU - Có thể thu gọn/ẩn hoàn toàn */
        .sidebar {
            width: 240px;
            min-width: 240px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: margin-left 0.25s ease-in-out; /* Tạo hiệu ứng đóng mở mượt */
        }

        /* Class để kích hoạt ẩn sidebar ra khỏi màn hình */
        .sidebar.collapsed {
            margin-left: -240px;
        }

        .sidebar-header {
            padding: 14px 16px;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }

        .file-actions {
            display: flex;
            gap: 14px;
            font-size: 13px;
        }
        .file-actions i { cursor: pointer; color: var(--text-muted); }
        .file-actions i:hover { color: var(--text-main); }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .tree-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            gap: 10px;
            color: #cbd5e1;
        }
        .tree-item:hover, .tree-item.active {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
        }
        .tree-item .item-icon { width: 16px; text-align: center; }
        
        /* Màu sắc Icon chuẩn cho từng ngôn ngữ như ảnh */
        .fa-folder { color: #f59e0b; }
        .fa-java { color: #ea2d2e; }
        .fa-html5 { color: #e34c26; }
        .fa-js { color: #f7df1e; }
        .fa-php { color: #777bb4; }

        /* VÙNG KHÔNG GIAN LẬP TRÌNH BÊN PHẢI */
        .editor-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--editor-bg);
            overflow: hidden;
            position: relative;
        }

        /* 3. THANH TAB CHỨA CÁC NGÔN NGỮ ĐANG MỞ TRÊN ĐẦU EDITOR */
        .tabs-bar {
            height: 38px;
            background-color: var(--tab-inactive);
            display: flex;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
        }
        /* Ẩn thanh cuộn của Tab bar trên trình duyệt di động */
        .tabs-bar::-webkit-scrollbar { display: none; }

        .tab-item {
            height: 100%;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            background-color: var(--tab-inactive);
            border-right: 1px solid var(--border-color);
            cursor: pointer;
            white-space: nowrap;
        }
        .tab-item.active {
            background-color: var(--tab-active);
            color: var(--text-main);
            border-bottom: 2px solid var(--accent-color);
        }

        /* KHUNG CHỨA TRÌNH SOẠN THẢO CODE MONACO */
        .editor-container-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
        }
        #editor-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
        }

        /* POPUP MENU KHI CHẠM GIỮ CODE */
        .custom-context-menu {
            position: absolute;
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: none;
            z-index: 1000;
            padding: 4px;
        }
        .menu-btn {
            background: none; border: none; color: white;
            padding: 6px 12px; font-size: 12px; cursor: pointer;
        }
        .menu-btn:hover { background-color: var(--accent-color); }

        /* PANEL KẾT QUẢ TRƯỢT TẠI CHỖ */
        .output-panel {
            position: absolute;
            top: 0; right: -100%;
            width: 100%; height: 100%;
            background-color: #000; z-index: 100;
            transition: right 0.25s ease-in-out;
            display: flex; flex-direction: column;
        }
        .output-panel.open { right: 0; }
        .output-header {
            height: 44px; background: var(--top-bar-bg);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; border-bottom: 1px solid var(--border-color);
        }
        .output-body { flex: 1; position: relative; }
        #preview-iframe, #terminal-box { width: 100%; height: 100%; border: none; }
        #terminal-box { padding: 16px; font-family: monospace; color: #00ff00; overflow-y: auto; white-space: pre-wrap; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="top-nav">
            <div class="nav-left">
                <i class="fa-solid fa-bars nav-icon active" id="btn-toggle-menu"></i>
                <i class="fa-solid fa-folder nav-icon"></i>
                <i class="fa-solid fa-code nav-icon"></i>
            </div>
            <div class="nav-right">
                <i class="fa-solid fa-play btn-run" id="btn-run-code"></i>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar" id="sidebar-menu">
                <div class="sidebar-header">
                    <span>FILES</span>
                    <div class="file-actions">
                        <i class="fa-solid fa-file-circle-plus" id="new-file-trigger"></i>
                        <i class="fa-solid fa-folder-plus" id="new-folder-trigger"></i>
                    </div>
                </div>
                
                <div class="file-tree">
                    <div class="tree-item"><i class="fa-solid fa-chevron-down" style="font-size:10px;"></i><i class="fa-solid fa-folder item-icon"></i> camera AI</div>
                    <div class="tree-item" style="padding-left: 32px;" onclick="openFile('babs.java', 'java')"><i class="fa-brands fa-java item-icon"></i> babs.java</div>
                    <div class="tree-item" style="padding-left: 32px;" onclick="openFile('index.html', 'html')"><i class="fa-brands fa-html5 item-icon"></i> index.html</div>
                    <div class="tree-item" style="padding-left: 32px;" onclick="openFile('gemini.js', 'javascript')"><i class="fa-brands fa-js item-icon"></i> gemini.js</div>
                    <div class="tree-item" style="padding-left: 32px;" onclick="openFile('Djdjd.php', 'php')"><i class="fa-brands fa-php item-icon"></i> Djdjd.php</div>
                </div>
            </div>

            <div class="editor-zone">
                <div class="tabs-bar" id="tabs-container">
                    </div>

                <div class="editor-container-wrapper">
                    <div id="editor-container"></div>
                </div>

                <div class="custom-context-menu" id="context-popup">
                    <button class="menu-btn" onclick="execAction('all')">Select All</button>
                    <button class="menu-btn" onclick="execAction('copy')">Copy</button>
                    <button class="menu-btn" onclick="execAction('paste')">Paste</button>
                </div>
            </div>

            <div class="output-panel" id="output-screen">
                <div class="output-header">
                    <span id="output-type">Output Terminal</span>
                    <button style="background:none; border:none; color:white; font-size:14px; cursor:pointer;" id="btn-close-output">✕ ĐÓNG</button>
                </div>
                <div class="output-body">
                    <iframe id="preview-iframe" style="display:none;"></iframe>
                    <div id="terminal-box" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let editor;
        let activeFile = 'index.html';
        let openedTabs = ['index.html', 'babs.java']; // Mặc định hiển thị trước 2 tab ngôn ngữ đang viết trên đầu

        const filesData = {
            'index.html': `\n<div style="background:#111; color:#fff; padding:20px; text-align:center;">\n    <h1>Giao diện chạy mượt mà tại chỗ!</h1>\n</div>`,
            'babs.java': `// Java Source\npublic class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello World from Java!");\n    }\n}`,
            'gemini.js': `// JavaScript Code\nconsole.log("Tính toán logic hệ thống:");\nconsole.log(50 + 100);`,
            'Djdjd.php': `<?php\n// PHP Code\necho "Hello from PHP Script!";`
        };

        const langMapping = { 'html': 'html', 'java': 'java', 'js': 'javascript', 'php': 'php' };

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: filesData[activeFile],
                language: 'html',
                theme: 'vs-dark',
                automaticLayout: true, // Cực kỳ quan trọng: Giúp code tự động giãn full màn hình khi ẩn menu
                fontSize: 15,
                renderIndentGuides: true,
                minimap: { enabled: false }
            });

            renderTabs();
            setupLongPressMenu();
        });

        // TÍNH NĂNG 1: ẨN HIỆN MENU SIDEBAR (Code tự động co giãn giữ nguyên vị trí full màn hình)
        document.getElementById('btn-toggle-menu').addEventListener('click', function() {
            const sidebar = document.getElementById('sidebar-menu');
            sidebar.classList.toggle('collapsed');
            
            // Kích hoạt tính năng vẽ lại khung của Monaco Editor sau khi Sidebar ẩn/hiện để lấp đầy khoảng trống
            setTimeout(() => { if(editor) editor.layout(); }, 260);
        });

        // TÍNH NĂNG 2: HIỂN THỊ CÁC TÊN NGÔN NGỮ ĐANG VIẾT LÊN TRÊN ĐẦU (TABS BAR)
        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';

            openedTabs.forEach(fileName => {
                const ext = fileName.split('.').pop();
                let iconHtml = `<i class="fa-brands fa-js" style="color:#f7df1e;"></i>`;
                if(ext==='html') iconHtml = `<i class="fa-brands fa-html5" style="color:#e34c26;"></i>`;
                if(ext==='java') iconHtml = `<i class="fa-brands fa-java" style="color:#ea2d2e;"></i>`;
                if(ext==='php') iconHtml = `<i class="fa-brands fa-php" style="color:#777bb4;"></i>`;

                const tab = document.createElement('div');
                tab.className = `tab-item ${fileName === activeFile ? 'active' : ''}`;
                tab.innerHTML = `${iconHtml} <span>${fileName}</span>`;
                
                // Click vào tab trên đầu để chuyển đổi file cực nhanh
                tab.onclick = () => {
                    const fileExt = fileName.split('.').pop();
                    openFile(fileName, langMapping[fileExt] || 'javascript');
                };
                container.appendChild(tab);
            });
        }

        // Hàm mở file hệ thống và cập nhật tab
        function openFile(fileName, lang) {
            if(editor) filesData[activeFile] = editor.getValue(); // Lưu code cũ lại
            activeFile = fileName;

            // Nếu file này chưa có trên thanh tab đầu trang, thêm nó vào danh sách mở nhanh
            if (!openedTabs.includes(fileName)) {
                openedTabs.push(fileName);
            }

            editor.setValue(filesData[fileName]);
            monaco.editor.setModelLanguage(editor.getModel(), lang);
            
            renderTabs(); // Vẽ lại thanh tab ngôn ngữ trên đầu
        }

        // TÍNH NĂNG 3: GIỮ TAY HOẶC PHẢI CHUỘT HIỆN POPUP MENU (Copy, Paste, Select All)
        function setupLongPressMenu() {
            const area = document.getElementById('editor-container');
            const popup = document.getElementById('context-popup');

            area.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                popup.style.display = 'block';
                popup.style.left = e.clientX + 'px';
                popup.style.top = (e.clientY - 35) + 'px';
            });

            document.addEventListener('click', function(e) {
                if(!popup.contains(e.target)) popup.style.display = 'none';
            });
        }

        function execAction(type) {
            if(type === 'all') {
                editor.focus();
                editor.setSelection(editor.getModel().getFullModelRange());
            } else if(type === 'copy') {
                const txt = editor.getModel().getValueInRange(editor.getSelection());
                navigator.clipboard.writeText(txt);
            } else if(type === 'paste') {
                navigator.clipboard.readText().then(t => {
                    const sel = editor.getSelection();
                    const r = new monaco.Range(sel.startLineNumber, sel.startColumn, sel.endLineNumber, sel.endColumn);
                    editor.executeEdits("", [{ range: r, text: t }]);
                });
            }
            document.getElementById('context-popup').style.display = 'none';
        }

        // TÍNH NĂNG 4: CHẠY CODE TRƯỢT SANG TRANG MỚI TẠI CHỖ KHÔNG LOAD LẠI TRANG CHÍNH
        document.getElementById('btn-run-code').addEventListener('click', async function() {
            const panel = document.getElementById('output-screen');
            const iframe = document.getElementById('preview-iframe');
            const terminal = document.getElementById('terminal-box');
            const typeText = document.getElementById('output-type');
            const code = editor.getValue();

            panel.classList.add('open'); // Hiển thị màn hình kết quả dạng Slide trượt mượt mà

            if(activeFile.endsWith('.html')) {
                typeText.innerText = "Browser Preview (HTML)";
                iframe.style.display = "block";
                terminal.style.display = "none";
                iframe.srcdoc = code;
            } else {
                typeText.innerText = "Console Terminal Output";
                iframe.style.display = "none";
                terminal.style.display = "block";
                terminal.innerText = "Running script...\n";

                let apiLang = "py"; let apiVer = "3.10.0";
                if(activeFile.endsWith('.js')) { apiLang = "js"; apiVer = "18.15.0"; }
                if(activeFile.endsWith('.java')) { apiLang = "java"; apiVer = "15.0.2"; }
                if(activeFile.endsWith('.php')) { apiLang = "php"; apiVer = "8.2.3"; }

                try {
                    const res = await fetch('https://emkc.org/api/v2/piston/execute', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            language: apiLang, version: apiVer,
                            files: [{ content: code }]
                        })
                    });
                    const data = await res.json();
                    if(data.run) {
                        terminal.innerText = data.run.stderr ? `[Bug Error Found]:\n${data.run.stderr}` : data.run.stdout;
                    }
                } catch(e) {
                    terminal.innerText = "Lỗi hệ thống biên dịch kết nối cloud server.";
                }
            }
        });

        document.getElementById('btn-close-output').addEventListener('click', function() {
            document.getElementById('output-screen').classList.remove('open');
        });
    </script>
</body>
</html>
