<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spck Code Editor - Ultimate Edition</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #07090e;         /* Màu nền sâu như ảnh 1 */
            --sidebar-bg: #0b0f19;      /* Màu sidebar tối chuẩn */
            --editor-bg: #0d111d;       /* Màu nền editor dịu mắt */
            --top-bar-bg: #090d16;
            --tab-active: #0d111d;
            --tab-inactive: #06090f;
            --accent-color: #3b82f6;
            --text-main: #e2e8f0;
            --text-muted: #6272a4;
            --border-color: #1a2333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100dvh;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            position: fixed;
        }

        .app-container {
            width: 100vw;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* BAR TRÊN CÙNG */
        .top-nav {
            height: 48px;
            background-color: var(--top-bar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 10;
        }

        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-icon {
            font-size: 18px;
            color: var(--text-muted);
            cursor: pointer;
        }
        .nav-icon.active { color: var(--text-main); }
        
        .btn-run {
            color: #10b981;
            font-size: 20px;
            cursor: pointer;
        }

        /* THÂN GIAO DIỆN CHÍNH */
        .main-content {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
            height: calc(100dvh - 48px);
        }

        /* SIDEBAR QUẢN LÝ FILE CHUẨN ẢNH 1 */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: margin-left 0.25s ease;
        }

        .sidebar.collapsed {
            margin-left: -260px;
        }

        .sidebar-header {
            padding: 14px 16px;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .file-actions {
            display: flex;
            gap: 14px;
            font-size: 14px;
        }
        .file-actions i { cursor: pointer; color: var(--text-muted); }
        .file-actions i:hover { color: var(--text-main); }

        /* Vùng cây danh mục File trống lúc mới vào */
        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .tree-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            color: #cbd5e1;
        }
        .tree-item:hover, .tree-item.active {
            background-color: rgba(255, 255, 255, 0.04);
            color: white;
        }
        
        .item-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .item-icon { width: 16px; text-align: center; }

        /* Nút ba chấm gọi Menu của từng file (Ảnh 3) */
        .item-more-btn {
            color: var(--text-muted);
            padding: 4px;
            cursor: pointer;
        }
        .item-more-btn:hover { color: white; }

        /* Thư viện màu sắc Icon Spck */
        .fa-folder { color: #f59e0b; }
        .fa-java { color: #ea2d2e; }
        .fa-html5 { color: #e34c26; }
        .fa-js { color: #f7df1e; }
        .fa-php { color: #777bb4; }
        .fa-css3-alt { color: #2196f3; }
        .fa-file-code { color: #9ccaed; }

        /* KHU VỰC CHỨA EDITOR */
        .editor-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--editor-bg);
            overflow: hidden;
            position: relative;
        }

        .tabs-bar {
            height: 38px;
            background-color: var(--tab-inactive);
            display: flex;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
        }
        .tabs-bar::-webkit-scrollbar { display: none; }

        .tab-item {
            height: 100%;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            background-color: var(--tab-inactive);
            border-right: 1px solid var(--border-color);
            cursor: pointer;
        }
        .tab-item.active {
            background-color: var(--tab-active);
            color: var(--text-main);
            border-bottom: 2px solid var(--accent-color);
        }

        .editor-container-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
        }
        #editor-container {
            position: absolute;
            top:0; left:0; right:0; bottom:0;
            width: 100%; height: 100%;
        }

        /* MENU TÙY CHỌN FILE / THƯ MỤC CHUẨN ẢNH 3 */
        .spck-context-menu {
            position: absolute;
            background-color: #121824;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            width: 180px;
            z-index: 500;
            padding: 4px 0;
        }
        .spck-menu-item {
            padding: 10px 16px;
            font-size: 13px;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .spck-menu-item:hover {
            background-color: var(--accent-color);
            color: white;
        }

        /* ĐOẠN KHUNG POPUP ĐỂ CHỮA LỖI EDIT VÙNG CHẠM GIỮ CODE */
        .editor-hold-menu {
            position: absolute;
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: none;
            z-index: 1000;
            padding: 4px;
        }
        .hold-btn {
            background: none; border: none; color: white;
            padding: 6px 12px; font-size: 12px; cursor: pointer;
        }
        .hold-btn:hover { background-color: var(--accent-color); }

        /* PANEL CHẠY KẾT QUẢ KHÔNG LOAD LẠI TRANG CỦA ẢNH 2 */
        .output-panel {
            position: absolute;
            top: 0; right: -100%;
            width: 100%; height: 100%;
            background-color: #000; z-index: 200;
            transition: right 0.25s cubic-bezier(0.075, 0.82, 0.165, 1);
            display: flex; flex-direction: column;
        }
        .output-panel.open { right: 0; }
        .output-header {
            height: 48px; background: var(--top-bar-bg);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; border-bottom: 1px solid var(--border-color);
        }
        .output-body { flex: 1; position: relative; background-color: #fff; }
        #preview-iframe { width: 100%; height: 100%; border: none; background: #fff; }
        #terminal-box { width: 100%; height: 100%; padding: 16px; font-family: monospace; color: #00ff00; background:#000; overflow-y: auto; white-space: pre-wrap; display: none;}

        /* THÔNG BÁO KHI CHƯA CÓ FILE */
        .empty-state {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="top-nav">
            <div class="nav-left">
                <i class="fa-solid fa-bars nav-icon active" id="sidebar-toggle-btn"></i>
                <i class="fa-solid fa-folder nav-icon"></i>
                <i class="fa-solid fa-code nav-icon"></i>
            </div>
            <div class="nav-right">
                <i class="fa-solid fa-file-zipper nav-icon" id="export-project-btn" title="Xuất toàn bộ thư mục (ZIP)"></i>
                <i class="fa-solid fa-play btn-run" id="run-code-btn"></i>
            </div>
        </div>

        <div class="main-content">
            
            <div class="sidebar" id="app-sidebar">
                <div class="sidebar-header">
                    <span>FILES</span>
                    <div class="file-actions">
                        <i class="fa-solid fa-file-circle-plus" id="add-file-btn" title="Tạo File"></i>
                        <i class="fa-solid fa-folder-plus" id="add-folder-btn" title="Tạo Thư mục"></i>
                    </div>
                </div>
                <div class="file-tree" id="file-tree-dom"></div>
            </div>

            <div class="editor-zone">
                <div class="tabs-bar" id="editor-tabs-dom"></div>
                <div class="editor-container-wrapper">
                    <div id="editor-container"></div>
                    <div class="empty-state" id="empty-notice">Không có file nào đang mở.<br>Hãy tạo file mới ở thanh bên trái để lập trình.</div>
                </div>

                <div class="editor-hold-menu" id="hold-popup">
                    <button class="hold-btn" onclick="triggerHoldAction('all')">Select All</button>
                    <button class="hold-btn" onclick="triggerHoldAction('copy')">Copy</button>
                    <button class="hold-btn" onclick="triggerHoldAction('paste')">Paste</button>
                </div>
            </div>

            <div class="output-panel" id="app-output-panel">
                <div class="output-header">
                    <span id="output-header-title">Live Preview</span>
                    <button style="background:none; border:none; color:white; font-size:14px; cursor:pointer;" id="close-output-btn">✕ ĐÓNG</button>
                </div>
                <div class="output-body">
                    <iframe id="preview-iframe"></iframe>
                    <div id="terminal-box"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="spck-context-menu" id="spck-file-menu">
        <div class="spck-menu-item" id="menu-opt-export"><i class="fa-solid fa-download"></i> Export File (Xuất)</div>
        <div class="spck-menu-item" id="menu-opt-rename"><i class="fa-solid fa-pen"></i> Rename (Đổi tên)</div>
        <div class="spck-menu-item" style="color: #ff453a;" id="menu-opt-delete"><i class="fa-solid fa-trash"></i> Delete (Xóa)</div>
    </div>

    <script>
        let editor;
        let virtualFiles = {}; // KHỞI TẠO TRỐNG HOÀN TOÀN THEO YÊU CẦU CỦA BẠN
        let openTabs = [];
        let activeFile = null;
        let selectedMenuFile = null; // Lưu vết file đang được nhấn Menu ba chấm

        const extLangMap = { 'html': 'html', 'css': 'css', 'js': 'javascript', 'java': 'java', 'php': 'php', 'swift': 'swift', 'cpp': 'cpp', 'c': 'c' };

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            // Khởi tạo Monaco Editor ẩn ban đầu
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: '',
                language: 'plaintext',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                renderIndentGuides: true,
                minimap: { enabled: false }
            });
            
            checkEmptyState();
            setupHoldMenu();
        });

        // ĐIỀU CHỈNH GIAO DIỆN ẨN HIỆN SIDEBAR GIỮ FULL MÀN HÌNH CODE
        document.getElementById('sidebar-toggle-btn').addEventListener('click', function() {
            const sidebar = document.getElementById('app-sidebar');
            sidebar.classList.toggle('collapsed');
            setTimeout(() => { if(editor) editor.layout(); }, 260);
        });

        // KIỂM TRA TRẠNG THÁI TRỐNG ĐỂ HIỂN THỊ THÔNG BÁO
        function checkEmptyState() {
            const notice = document.getElementById('empty-notice');
            if (!activeFile) {
                notice.style.display = 'block';
                if(editor) editor.getContainerNode().style.opacity = '0';
            } else {
                notice.style.display = 'none';
                if(editor) editor.getContainerNode().style.opacity = '1';
            }
        }

        // TẠO FILE MỚI ĐỘNG (BẬT RA ĐỂ NHẬP TÊN)
        document.getElementById('add-file-btn').addEventListener('click', function() {
            const name = prompt("Nhập tên tệp tin cần tạo (Ví dụ: index.html, babs.java, main.js):");
            if(!name) return;
            if(virtualFiles[name] !== undefined) return alert("Tên tệp tin đã tồn tại!");

            virtualFiles[name] = name.endsWith('.html') ? `\n<h1>Hello World</h1>` : `// Code ${name}\n`;
            renderFileTree();
            switchToSubFile(name);
        });

        // TẠO THƯ MỤC MỚI ĐỘNG
        document.getElementById('add-folder-btn').addEventListener('click', function() {
            const name = prompt("Nhập tên thư mục mới:");
            if(!name) return;
            renderFileTree(name);
        });

        // VẼ CÂY FILE TREE LÊN MÀN HÌNH CHUẨN ĐẸP
        function renderFileTree(customFolder = null) {
            const container = document.getElementById('file-tree-dom');
            container.innerHTML = '';

            if(customFolder) {
                const folderItem = document.createElement('div');
                folderItem.className = "tree-item";
                folderItem.innerHTML = `<div class="item-info"><i class="fa-solid fa-folder item-icon"></i> <span>${customFolder}</span></div>`;
                container.appendChild(folderItem);
            }

            Object.keys(virtualFiles).forEach(filename => {
                const ext = filename.split('.').pop().toLowerCase();
                let icon = "fa-file-code";
                if(ext === 'html') icon = "fa-brands fa-html5";
                else if(ext === 'js') icon = "fa-brands fa-js";
                else if(ext === 'css') icon = "fa-brands fa-css3-alt";
                else if(ext === 'java') icon = "fa-brands fa-java";
                else if(ext === 'php') icon = "fa-brands fa-php";

                const fileItem = document.createElement('div');
                fileItem.className = `tree-item ${filename === activeFile ? 'active' : ''}`;
                fileItem.innerHTML = `
                    <div class="item-info" onclick="switchToSubFile('${filename}')">
                        <i class="${icon} item-icon"></i>
                        <span>${filename}</span>
                    </div>
                    <i class="fa-solid fa-ellipsis-vertical item-more-btn" onclick="openSpckMenu(event, '${filename}')"></i>
                `;
                container.appendChild(fileItem);
            });
            checkEmptyState();
        }

        // CHUYỂN ĐỔI QUA LẠI GIỮA CÁC FILE & ĐỒNG BỘ TAB TRÊN ĐẦU
        function switchToSubFile(filename) {
            if(activeFile && editor) {
                virtualFiles[activeFile] = editor.getValue();
            }

            activeFile = filename;
            if(!openTabs.includes(filename)) openTabs.push(filename);

            const ext = filename.split('.').pop().toLowerCase();
            editor.setValue(virtualFiles[filename]);
            monaco.editor.setModelLanguage(editor.getModel(), extLangMap[ext] || 'plaintext');

            renderTabsBar();
            renderFileTree();
        }

        function renderTabsBar() {
            const container = document.getElementById('editor-tabs-dom');
            container.innerHTML = '';

            openTabs.forEach(tab => {
                const tabDom = document.createElement('div');
                tabDom.className = `tab-item ${tab === activeFile ? 'active' : ''}`;
                tabDom.innerHTML = `<span>${tab}</span>`;
                tabDom.onclick = () => switchToSubFile(tab);
                container.appendChild(tabDom);
            });
        }

        // CHỨC NĂNG ẢNH 3: HIỂN THỊ MENU POPUP BA CHẤM ĐỘC LẬP CHO TỪNG FILE
        function openSpckMenu(e, filename) {
            e.stopPropagation();
            selectedMenuFile = filename;
            const menu = document.getElementById('spck-file-menu');
            menu.style.display = 'flex';
            menu.style.left = (e.clientX - 160) + 'px';
            menu.style.top = e.clientY + 'px';
        }

        // Tắt menu khi ấn ra ngoài
        document.addEventListener('click', () => {
            document.getElementById('spck-file-menu').style.display = 'none';
        });

        // LOGIC TRÊN MENU TÙY CHỌN FILE (ẢNH 3)
        // 1. Xuất file độc lập đơn lẻ trực tiếp máy người dùng
        document.getElementById('menu-opt-export').addEventListener('click', function() {
            if(!selectedMenuFile) return;
            const blob = new Blob([virtualFiles[selectedMenuFile]], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = selectedMenuFile;
            a.click();
        });

        // 2. Đổi tên file
        document.getElementById('menu-opt-rename').addEventListener('click', function() {
            if(!selectedMenuFile) return;
            const newName = prompt("Nhập tên mới cho file:", selectedMenuFile);
            if(!newName || newName === selectedMenuFile) return;
            
            virtualFiles[newName] = virtualFiles[selectedMenuFile];
            delete virtualFiles[selectedMenuFile];
            
            if(activeFile === selectedMenuFile) activeFile = newName;
            let idx = openTabs.indexOf(selectedMenuFile);
            if(idx !== -1) openTabs[idx] = newName;

            renderFileTree();
            renderTabsBar();
        });

        // 3. Xóa File
        document.getElementById('menu-opt-delete').addEventListener('click', function() {
            if(!selectedMenuFile || !confirm(`Bạn có chắc muốn xóa file ${selectedMenuFile}?`)) return;
            
            delete virtualFiles[selectedMenuFile];
            openTabs = openTabs.filter(t => t !== selectedMenuFile);
            
            if(activeFile === selectedMenuFile) {
                activeFile = openTabs.length > 0 ? openTabs[0] : null;
            }

            if(activeFile) switchToSubFile(activeFile);
            else {
                renderFileTree();
                renderTabsBar();
            }
        });

        // CHỨC NĂNG XUẤT TOÀN BỘ PROJECT THƯ MỤC DƯỚI DẠNG ĐÓNG GÓI .ZIP
        document.getElementById('export-project-btn').addEventListener('click', function() {
            if(Object.keys(virtualFiles).length === 0) return alert("Thư mục trống, không có gì để đóng gói!");
            
            const projectName = prompt("Nhập tên thư mục dự án cần đặt để xuất file ZIP:", "MyProjectAI");
            if(!projectName) return;

            const zip = new JSZip();
            // Đưa toàn bộ file ảo hóa hiện tại vào gói nén zip
            Object.keys(virtualFiles).forEach(filename => {
                zip.file(`${projectName}/${filename}`, virtualFiles[filename]);
            });

            zip.generateAsync({ type: 'blob' }).then(function(content) {
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${projectName}.zip`;
                a.click();
            });
        });

        // CHỨC NĂNG CHẠY CODE CHUẨN ẢNH 2 (MÀN HÌNH TRƯỢT TẠI CHỖ KHÔNG TẢI LẠI TRANG)
        document.getElementById('run-code-btn').addEventListener('click', async function() {
            if(!activeFile) return alert("Hãy chọn hoặc tạo một file để chạy!");
            
            if(editor) virtualFiles[activeFile] = editor.getValue(); // Đồng bộ dữ liệu hiện tại trước khi thực thi

            const panel = document.getElementById('app-output-panel');
            const iframe = document.getElementById('preview-iframe');
            const terminal = document.getElementById('terminal-box');
            const title = document.getElementById('output-header-title');

            panel.classList.add('open');

            if(activeFile.endsWith('.html')) {
                title.innerText = "Live HTML Preview Server";
                iframe.style.display = 'block';
                terminal.style.display = 'none';
                iframe.srcdoc = virtualFiles[activeFile];
            } else {
                title.innerText = "Console Multi-language Terminal";
                iframe.style.display = 'none';
                terminal.style.display = 'block';
                terminal.innerText = ">>> Đang gửi yêu cầu và biên dịch thực thi hệ thống...\n";

                let lang = "py"; let ver = "3.10.0";
                if(activeFile.endsWith('.js')) { lang = "js"; ver = "18.15.0"; }
                else if(activeFile.endsWith('.java')) { lang = "java"; ver = "15.0.2"; }
                else if(activeFile.endsWith('.php')) { lang = "php"; ver = "8.2.3"; }

                try {
                    const res = await fetch('https://emkc.org/api/v2/piston/execute', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            language: lang, version: ver,
                            files: [{ content: virtualFiles[activeFile] }]
                        })
                    });
                    const resData = await res.json();
                    if(resData.run) {
                        terminal.innerText = resData.run.stderr ? `[Lỗi chương trình]:\n${resData.run.stderr}` : resData.run.stdout;
                    }
                } catch (e) {
                    terminal.innerText = "Lỗi kết nối Server biên dịch.";
                }
            }
        });

        document.getElementById('close-output-btn').addEventListener('click', function() {
            document.getElementById('app-output-panel').classList.remove('open');
        });

        // MENU POPUP CHẠM GIỮ TRÊN CODE ĐỂ COPY/PASTE
        function setupHoldMenu() {
            const dom = document.getElementById('editor-container');
            const pop = document.getElementById('hold-popup');

            dom.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                pop.style.display = 'block';
                pop.style.left = e.clientX + 'px';
                pop.style.top = (e.clientY - 35) + 'px';
            });

            document.addEventListener('click', (e) => { if(!pop.contains(e.target)) pop.style.display = 'none'; });
        }

        function triggerHoldAction(act) {
            if(!editor) return;
            if(act === 'all') { editor.focus(); editor.setSelection(editor.getModel().getFullModelRange()); }
            else if(act === 'copy') { navigator.clipboard.writeText(editor.getModel().getValueInRange(editor.getSelection())); }
            else if(act === 'paste') { navigator.clipboard.readText().then(t => {
                const s = editor.getSelection();
                editor.executeEdits("", [{ range: new monaco.Range(s.startLineNumber, s.startColumn, s.endLineNumber, s.endColumn), text: t }]);
            }); }
            document.getElementById('hold-popup').style.display = 'none';
        }
    </script>
</body>
</html>
