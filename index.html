<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spck Workspace Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="top-nav">
            <div class="nav-left">
                <i class="fa-solid fa-bars nav-icon" id="btn-toggle-menu"></i>
                <i class="fa-solid fa-folder nav-icon"></i>
                <i class="fa-solid fa-code nav-icon"></i>
            </div>
            <div class="nav-right">
                <i class="fa-solid fa-play btn-run" id="btn-run-code"></i>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar collapsed" id="sidebar-menu">
                <div class="sidebar-header">
                    <span>WORKSPACE</span>
                    <div class="file-actions">
                        <i class="fa-solid fa-file-circle-plus" id="new-file-trigger" title="Tạo File"></i>
                        <i class="fa-solid fa-folder-plus" id="new-folder-trigger" title="Tạo Thư Mục"></i>
                    </div>
                </div>
                <div class="file-tree" id="file-tree-container"></div>
            </div>

            <div class="editor-zone">
                <div class="editor-overlay" id="editor-block-overlay"></div>
                <div class="tabs-bar" id="tabs-container"></div>
                <div class="editor-container-wrapper">
                    <div id="editor-container"></div>
                    <div class="empty-screen-msg" id="empty-msg">
                        Chưa có file nào được mở.<br>Hãy nhấn biểu tượng Menu góc trái để quản lý dự án.
                    </div>
                </div>
            </div>

            <div class="output-panel" id="output-screen">
                <div class="output-header">
                    <span id="output-type">Live Preview</span>
                    <button id="btn-close-output">✕ ĐÓNG</button>
                </div>
                <div class="output-body">
                    <iframe id="preview-iframe"></iframe>
                    <div id="terminal-box"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
