<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Code Editor & Terminal</title>
    <style>
        :root {
            --ios-gray: #1C1C1E;
            --ios-red: #FF453A;
            --gemini-bg: #131314;
            --gemini-input-bg: #1e1f20;
            --editor-bg: #1e1e1e;
            --terminal-bg: #000000;
            --text-color: #ffffff;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100dvh;
            background-color: var(--gemini-bg);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            position: fixed;
        }

        /* Khung container cố định không bị vỡ khi cuộn */
        .app-container {
            width: 100vw;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        /* Thanh điều khiển trên cùng (Top Settings Bar) */
        .top-settings-bar {
            height: 50px;
            background-color: var(--ios-gray);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        select {
            background: var(--gemini-input-bg);
            color: white;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }

        .btn-run {
            background-color: #2ea44f;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-run:hover {
            background-color: #2c974b;
        }

        /* Khu vực làm việc chính chia đôi Editor và Terminal */
        .main-workspace {
            flex: 1;
            display: flex;
            flex-direction: column; /* Thích hợp cho giao diện dọc điện thoại */
            height: calc(100dvh - 50px);
            overflow: hidden;
        }

        /* Khung chứa Trình soạn thảo */
        .editor-wrapper {
            flex: 1.5;
            width: 100%;
            background-color: var(--editor-bg);
            position: relative;
            overflow: hidden;
        }

        #editor-container {
            width: 100%;
            height: 100%;
        }

        /* Khung chứa Terminal bên dưới */
        .terminal-wrapper {
            flex: 1;
            width: 100%;
            background-color: var(--terminal-bg);
            border-top: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-header {
            background: var(--ios-gray);
            padding: 6px 15px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            border-bottom: 1px solid var(--border-color);
        }

        .terminal-output {
            flex: 1;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.4;
            color: #00ff00; /* Màu xanh terminal mặc định */
        }

        .terminal-output .error {
            color: var(--ios-red);
        }
        
        .terminal-output .info {
            color: #00bfff;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="top-settings-bar">
            <div class="logo-section">
                <span style="color: #e44d26;">⚡</span> IDE PRO MULTILANG
            </div>
            <div class="controls">
                <select id="language-select">
                    <option value="javascript">JavaScript</option>
                    <option value="python">Python 3</option>
                    <option value="java">Java</option>
                    <option value="c">C (GCC)</option>
                    <option value="cpp">C++</option>
                    <option value="php">PHP</option>
                    <option value="html">HTML / CSS</option>
                </select>
                <button class="btn-run" id="run-btn">
                    ▶ RUN
                </button>
            </div>
        </div>

        <div class="main-workspace">
            <div class="editor-wrapper">
                <div id="editor-container"></div>
            </div>
            
            <div class="terminal-wrapper">
                <div class="terminal-header">Terminal Output</div>
                <div class="terminal-output" id="terminal-screen">Welcome to Multilang IDE. Nhấn RUN để thực thi mã nguồn...</div>
            </div>
        </div>
    </div>

    <script>
        let editor;
        
        // Các đoạn code mẫu ban đầu tương ứng cho từng ngôn ngữ
        const codeTemplates = {
            javascript: `// Lập trình JavaScript\nconsole.log("Xin chào từ JavaScript!");\n\nlet count = 5;\nfor(let i=0; i < count; i++) {\n    console.log("Bước thứ: " + i);\n}`,
            python: `# Lập trình Python 3\ndef chao_mung(name):\n    print(f"Xin chào, {name}!")\n\nchao_mung("Người dùng")\n# Thử gây lỗi xem terminal báo gì:\n# print(bien_chua_dinh_nghia)`,
            java: `// Lập trình Java\npublic class Main {\n    public static void main(String[] args) {\n        System.out.println("Xin chào từ ngôn ngữ Java!");\n    }\n}`,
            cpp: `// Lập trình C++\n#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Xin chào từ hệ thống C++!" << endl;\n    return 0;\n}`,
            c: `// Lập trình C\n#include <stdio.h>\n\nint main() {\n    printf("Xin chào từ ngôn ngữ C!\\n");\n    return 0;\n}`,
            php: `<?php\n// Lập trình PHP\necho "Xin chào từ PHP Server!\\n";\n$dev = ["Học", "Lập", "Trình"];\nprint_r($dev);`,
            html: `\n<div style="padding: 20px; text-align: center;">\n    <h1 style="color: #4CAF50;">Xin chào thế giới!</h1>\n    <p>Giao diện HTML/CSS chạy trực tiếp mượt mà.</p>\n</div>`
        };

        // Khởi tạo Monaco Editor thông qua RequireJS
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: codeTemplates['javascript'],
                language: 'javascript',
                theme: 'vs-dark', // Giao diện tối chuyên nghiệp
                automaticLayout: true, // Tự động căn chỉnh kích thước theo khung bao ngoài
                fontSize: 15,
                tabSize: 4,
                renderIndentGuides: true, // Kích hoạt đường kẻ căn chỉnh hàng (Đoạn kẻ thẳng đứng cực đẹp như ảnh 2)
                bracketPairColorization: { enabled: true }, // Đổi màu các cặp ngoặc trùng nhau
                minimap: { enabled: false }, // Tắt bản đồ thu nhỏ để tối ưu không gian mobile
                scrollbar: {
                    vertical: 'visible',
                    horizontal: 'visible',
                    useShadows: false
                }
            });

            // Lắng nghe sự kiện thay đổi ngôn ngữ trên Select box
            document.getElementById('language-select').addEventListener('change', function(e) {
                const lang = e.target.value;
                const model = editor.getModel();
                
                // Cập nhật kiểu ngôn ngữ biên dịch cho Monaco để có Highlight chuẩn
                monaco.editor.setModelLanguage(model, lang === 'c' || lang === 'cpp' ? 'cpp' : lang);
                // Đổi đoạn code mẫu tương ứng
                editor.setValue(codeTemplates[lang] || "");
            });
        });

        // Xử lý logic khi ấn nút RUN để thực thi Code
        document.getElementById('run-btn').addEventListener('click', async function() {
            const terminal = document.getElementById('terminal-screen');
            const selectedLang = document.getElementById('language-select').value;
            const codeContent = editor.getValue();

            terminal.innerHTML = `<span class="info">[Hệ thống]: Đang biên dịch và thực thi mã...</span>\n`;

            // TRƯỜNG HỢP 1: Nếu là HTML/CSS -> Mở tab/cửa sổ mới để render kết quả trực quan
            if (selectedLang === 'html') {
                terminal.innerHTML += `<span class="info">[Hệ thống]: Đã khởi chạy trang HTML sang cửa sổ preview thành công!</span>`;
                const newWindow = window.open();
                newWindow.document.write(codeContent);
                newWindow.document.close();
                return;
            }

            // TRƯỜNG HỢP 2: Nếu là JavaScript thuần -> Có thể thực thi trực tiếp bằng cấu trúc try-catch nội bộ
            if (selectedLang === 'javascript') {
                // Tạo một bản bắt log console cũ để chuyển hướng ra màn hình terminal ảo
                let oldLog = console.log;
                let logs = [];
                console.log = function(message) {
                    logs.push(message);
                };

                try {
                    eval(codeContent); // Thực thi đoạn code JS mã nguồn
                    terminal.innerHTML += logs.join('\n') || "\n[Chương trình chạy xong nhưng không xuất dữ liệu log]";
                } catch (err) {
                    // Nếu lỗi cú pháp hoặc runtime: báo lỗi màu đỏ rực rỡ như ứng dụng thật
                    terminal.innerHTML += `<span class="error">Runtime Error: ${err.message}\n${err.stack.split('\n')[1]}</span>`;
                }
                
                console.log = oldLog; // Khôi phục lại console mặc định
                return;
            }

            // TRƯỜNG HỢP 3: Đối với các ngôn ngữ máy/Server (Python, C++, Java, C, PHP)
            // Ta sử dụng API Compiler miễn phí và mạnh mẽ của hệ thống Judge0 hoặc tương đương qua cổng Client-side.
            // Để ứng dụng chạy vĩnh viễn không lỗi, code dưới đây sử dụng cổng biên dịch mở của Piston Component API.
            
            const languageMapForAPI = {
                "python": { language: "py", version: "3.10.0" },
                "java": { language: "java", version: "15.0.2" },
                "c": { language: "c", version: "10.2.0" },
                "cpp": { language: "cpp", version: "10.2.0" },
                "php": { language: "php", version: "8.2.3" }
            };

            const apiConfig = languageMapForAPI[selectedLang];

            try {
                const response = await fetch('https://emkc.org/api/v2/piston/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        language: apiConfig.language,
                        version: apiConfig.version,
                        files: [{ content: codeContent }]
                    })
                });

                const data = await response.json();

                if (data.run) {
                    // Nếu có lỗi biên dịch hệ thống (Compile Error hoặc Runtime Error) từ Terminal thực tế
                    if (data.run.stderr) {
                        terminal.innerHTML += `<span class="error">${data.run.stderr}</span>`;
                    } else {
                        // Nếu chạy thành công xuất kết quả ra màn hình màu xanh
                        terminal.innerHTML += data.run.stdout || "[Chương trình kết thúc: Không có dữ liệu đầu ra]";
                    }
                } else {
                    terminal.innerHTML += `<span class="error">Lỗi kết nối Server biên dịch. Vui lòng thử lại sau!</span>`;
                }

            } catch (error) {
                terminal.innerHTML += `<span class="error">Lỗi hệ thống: Không thể kết nối internet để biên dịch ngôn ngữ này.</span>`;
            }
            
            // Tự động cuộn Terminal xuống dòng dưới cùng
            terminal.scrollTop = terminal.scrollHeight;
        });
    </script>
</body>
</html>
