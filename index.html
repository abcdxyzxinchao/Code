<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spck Editor IDE Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="top-nav">
            <div class="nav-left">
                <i class="fa-solid fa-bars nav-icon" id="btn-toggle-menu"></i>
                <div class="project-title">
                    <i class="fa-solid fa-folder-open"></i>
                    <span>camera AI</span>
                </div>
            </div>
            <div class="nav-right">
                <i class="fa-solid fa-play btn-run" id="btn-run-code" title="Chạy ứng dụng"></i>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar" id="sidebar-menu">
                <div class="sidebar-header">
                    <span>FILES</span>
                    <div class="file-actions">
                        <i class="fa-solid fa-file-circle-plus" id="new-file-trigger" title="Tạo File"></i>
                        <i class="fa-solid fa-folder-plus" id="new-folder-trigger" title="Tạo Thư Mục"></i>
                    </div>
                </div>
                <div class="file-tree" id="file-tree-container">
                    </div>
            </div>

            <div class="workspace-body">
                <div class="tabs-bar" id="tabs-container"></div>
                
                <div class="split-pane-container">
                    <div class="editor-zone">
                        <div id="editor-container"></div>
                        <div class="empty-screen-msg" id="empty-msg">
                            Không có file nào đang mở.<br>Hãy tạo hoặc chọn file ở thanh bên trái để lập trình.
                        </div>
                    </div>

                    <div class="output-panel" id="output-screen">
                        <div class="output-header">
                            <div class="output-header-left">
                                <i class="fa-solid fa-globe"></i>
                                <span id="output-url">localhost</span>
                            </div>
                            <div class="output-header-actions">
                                <i class="fa-solid fa-rotate-right" id="btn-refresh-preview" title="Tải lại"></i>
                                <button id="btn-close-output"><i class="fa-solid fa-xmark"></i> XONG</button>
                            </div>
                        </div>
                        <div class="output-body">
                            <iframe id="preview-iframe"></iframe>
                            <div id="terminal-box"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
