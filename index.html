<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile IDE Advanced Pro - Final Edition</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/hint/show-hint.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f141c; color: #e1e4e8; display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; }
        
        /* CỐ ĐỊNH HEADER BAR */
        .header-bar { height: 50px; background: #161b22; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; border-bottom: 1px solid #21262d; z-index: 100; position: sticky; top: 0; width: 100%; flex-shrink: 0; }
        .menu-btn { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; display: flex; align-items: center; }
        .title { font-weight: bold; font-size: 15px; color: #f0f6fc; display: flex; align-items: center; gap: 6px; }
        
        /* Workspace layout */
        .workspace { display: flex; flex: 1; position: relative; overflow: hidden; }
        
        /* Sidebar quản lý file */
        .sidebar { width: 260px; background: #161b22; border-right: 1px solid #21262d; display: flex; flex-direction: column; position: absolute; left: -260px; top: 0; bottom: 0; z-index: 150; transition: 0.2s ease-in-out; }
        .sidebar.open { left: 0; }
        .sidebar-header { padding: 15px 12px; font-size: 12px; font-weight: bold; color: #8b949e; letter-spacing: 1px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-tools { display: flex; gap: 12px; }
        .sidebar-tools button { background: none; border: none; color: #58a6ff; font-size: 16px; cursor: pointer; }
        .file-list { padding: 8px; flex: 1; overflow-y: auto; }
        
        /* Cây thư mục */
        .tree-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-bottom: 2px; display: flex; align-items: center; gap: 8px; color: #c9d1d9; }
        .tree-item:hover { background: #21262d; }
        .tree-item.active { background: #21262d; color: #58a6ff; border: 1px solid #30363d; font-weight: bold; }

        /* Vùng soạn thảo - Cuộn mượt code không trôi thanh cụ */
        .editor-area { flex: 1; display: flex; flex-direction: column; height: 100%; width: 100%; overflow: hidden; }
        
        /* CỐ ĐỊNH TOOL BAR */
        .tool-bar { background: #0f141c; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; gap: 10px; border-bottom: 1px solid #21262d; position: sticky; top: 0; z-index: 90; flex-shrink: 0; }
        .current-lang-tag { background: #21262d; color: #58a6ff; border: 1px solid #30363d; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .btn-group { display: flex; gap: 6px; }
        .btn { padding: 6px 14px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        .btn-run { background: #238636; color: white; }
        .btn-copy { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }

        /* Cuộn bên trong Editor */
        .CodeMirror { flex: 1; height: 100% !important; font-size: 14px; font-family: 'Fira Code', monospace; overflow: auto; }
        
        /* CỐ ĐỊNH PHÍM TẮT DI ĐỘNG */
        .mobile-shortcuts { height: 42px; background: #161b22; display: flex; align-items: center; gap: 16px; padding: 0 12px; border-top: 1px solid #21262d; overflow-x: auto; white-space: nowrap; flex-shrink: 0; position: relative; z-index: 95; }
        .shortcut-btn { color: #8b949e; background: none; border: none; font-size: 16px; font-weight: 500; padding: 4px 8px; cursor: pointer; }
        .shortcut-btn:active { color: #fff; }

        /* MÀN HÌNH PREVIEW OVERLAY TOÀN MÀN HÌNH */
        .preview-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e1e; z-index: 200; display: none; flex-direction: column; }
        .preview-overlay.open { display: flex; }
        
        /* THANH ĐIỀU HƯỚNG GIẢ LẬP SAFARI */
        .safari-bar { background: #f1f1f1; color: #333; padding: 6px 10px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #ccc; font-size: 13px; }
        .safari-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: #555; padding: 2px 6px; }
        .safari-address-bar { flex: 1; background: #fff; border: 1px solid #ddd; padding: 4px 10px; border-radius: 20px; font-family: sans-serif; font-size: 12px; display: flex; align-items: center; justify-content: space-between; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .safari-indicator { display: flex; align-items: center; gap: 4px; color: #238636; font-weight: bold; font-size: 11px; }

        /* Thiết kế giao diện Terminal & Input */
        .preview-header { height: 50px; background: #161b22; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; border-bottom: 1px solid #21262d; flex-shrink: 0; }
        .preview-body { flex: 1; width: 100%; border: none; background: #ffffff; }
        
        /* Khu vực Terminal kèm ô nhập Stdin */
        .terminal-container { flex: 1; display: flex; flex-direction: column; background: #0c0f12; overflow: hidden; }
        .console-log-output { flex: 1; color: #00ff66; padding: 16px; font-family: 'Courier New', Courier, monospace; overflow-y: auto; font-size: 14px; white-space: pre-wrap; line-height: 1.5; }
        
        /* Ô nhập dữ liệu Terminal (STDIN) cho mọi loại ngôn ngữ */
        .terminal-input-bar { display: flex; background: #161b22; border-top: 1px solid #21262d; padding: 6px 12px; align-items: center; gap: 8px; }
        .terminal-input-bar span { font-family: monospace; color: #58a6ff; font-weight: bold; font-size: 14px; }
        .terminal-input-bar input { flex: 1; background: transparent; border: none; color: #fff; font-family: monospace; font-size: 14px; outline: none; }
    </style>
</head>
<body>

    <div class="header-bar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="title" id="current-file-title">🧡 index.html</div>
        <button class="menu-btn" style="color: #238636;" onclick="runCode()">▶</button>
    </div>

    <div class="workspace">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>PROJECT FILES</span>
                <div class="sidebar-tools">
                    <button onclick="createNewFile()">📄+</button>
                </div>
            </div>
            <div class="file-list" id="fileList"></div>
        </div>

        <div class="editor-area">
            <div class="tool-bar">
                <div class="current-lang-tag" id="currentLangTag">HTML Mixed</div>
                <div class="btn-group">
                    <button class="btn btn-copy" onclick="copyCode()">Copy</button>
                    <button class="btn btn-run" onclick="runCode()">RUN</button>
                </div>
            </div>

            <textarea id="code-editor"></textarea>
        </div>
    </div>

    <div class="mobile-shortcuts">
        <button class="shortcut-btn" onclick="insertChar('<')">&lt;</button>
        <button class="shortcut-btn" onclick="insertChar('>')">&gt;</button>
        <button class="shortcut-btn" onclick="insertChar('/')">/</button>
        <button class="shortcut-btn" onclick="insertChar('{')">{</button>
        <button class="shortcut-btn" onclick="insertChar('}')">}</button>
        <button class="shortcut-btn" onclick="insertChar('(')">(</button>
        <button class="shortcut-btn" onclick="insertChar(')')">)</button>
        <button class="shortcut-btn" onclick="insertChar('\"')">"</button>
        <button class="shortcut-btn" onclick="insertChar(';')">;</button>
        <button class="shortcut-btn" onclick="handleTabShortcut()">Tab</button>
    </div>

    <div class="preview-overlay" id="previewOverlay">
        <div class="preview-header">
            <button class="btn-back" onclick="closePreview()">← Quay lại</button>
            <button class="btn" id="btnExternalOpen" style="background:#007aff; color:white; font-size:12px;" onclick="openInRealBrowser()">🌐 Mở Safari thật (Fix Đăng Nhập)</button>
        </div>

        <div class="safari-bar" id="safariBar" style="display:none;">
            <button class="safari-btn" onclick="runCode()">🔄</button>
            <div class="safari-address-bar">
                <span id="safariUrlText">safari://localhost/index.html</span>
                <div class="safari-indicator">🔒 Safari</div>
            </div>
        </div>

        <iframe class="preview-body" id="webPreviewFrame" style="display:none;"></iframe>
        
        <div class="terminal-container" id="terminalContainer" style="display:none;">
            <div class="console-log-output" id="consoleOutput"></div>
            <div class="terminal-input-bar">
                <span>$ STDIN &gt;</span>
                <input type="text" id="terminalStdin" placeholder="Nhập dữ liệu đầu vào tại đây rồi bấm RUN..." />
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/hint/show-hint.min.js"></script>

    <script>
        let editor;
        let currentFile = 'index.html';
        
        let fileSystem = [
            { 
                name: 'index.html', 
                type: 'file', 
                content: '<!DOCTYPE html>\n<html lang="vi">\n<head>\n<meta charset="UTF-8">\n<title>Camera AI Studio</title>\n<style>\nbody { background: #111; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }\n.card { background: #222; max-width: 350px; margin: auto; padding: 30px; border-radius: 12px; border: 1px solid #333; }\n.btn { background: #007aff; border: none; padding: 12px 24px; color: #fff; border-radius: 8px; font-size: 16px; margin-top: 20px; width: 100%; cursor: pointer; }\n</style>\n</head>\n<body>\n <div class="card">\n <h1>Camera AI Studio</h1>\n <p>Nếu không click Đăng nhập được trong khung preview này, hãy nhấn nút màu xanh "Mở Safari thật" ở thanh phía trên.</p>\n <button class="btn" onclick="alert(\'Bấm nút mở Safari bên trên thanh công cụ để xử lý xác thực OAuth thật nhé!\')">Tiếp tục với Google</button>\n </div>\n</body>\n</html>' 
            },
            { 
                name: 'main.py', 
                type: 'file', 
                content: '# Nhập dữ liệu đầu vào từ thanh Terminal bên dưới\nten = input("Nhập tên của mày: ")\nprint(f"Chào mừng {ten} đến với Terminal Sandbox!")\n\na = 100\nb = 200\nprint(f"Kết quả tính toán: {a} + {b} = {a+b}")' 
            }
        ];

        window.onload = function() {
            editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
                lineNumbers: true,
                theme: "dracula",
                mode: "htmlmixed",
                indentUnit: 4,
                smartIndent: true,
                lineWrapping: true,
                extraKeys: {
                    "Tab": function(cm) { cm.replaceSelection("    ", "end"); }
                }
            });

            editor.on("change", function() {
                saveCurrentFileContent();
            });

            const initialFile = fileSystem.find(f => f.name === currentFile);
            if(initialFile) {
                editor.setValue(initialFile.content);
            }

            renderFileList();
        };

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('open'); 
        }

        function saveCurrentFileContent() {
            const fileObj = fileSystem.find(f => f.name === currentFile);
            if(fileObj) fileObj.content = editor.getValue();
        }

        function getFileIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            if (ext === 'html') return '<span style="color: #e34c26;">🧡</span>';
            if (ext === 'py') return '<span style="color: #3572A5;">💚</span>';
            if (ext === 'cpp') return '<span style="color: #f34b7d;">❤️</span>';
            if (ext === 'java') return '<span style="color: #b07219;">🤎</span>';
            return '<span style="color: #8b949e;">📄</span>';
        }

        function renderFileList() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            
            fileSystem.forEach(item => {
                const div = document.createElement('div');
                div.className = `tree-item ${item.name === currentFile ? 'active' : ''}`;
                div.innerHTML = `${getFileIcon(item.name)} <span>${item.name}</span>`;
                
                div.onclick = () => {
                    saveCurrentFileContent();
                    currentFile = item.name;
                    document.getElementById('current-file-title').innerHTML = `${getFileIcon(item.name)} ${item.name}`;
                    editor.setValue(item.content);
                    
                    let ext = item.name.split('.').pop().toLowerCase();
                    let modeName = "htmlmixed";
                    let tagText = "HTML Mixed";
                    
                    if(ext === 'py') { modeName = "python"; tagText = "Python 3"; }
                    if(ext === 'cpp') { modeName = "text/x-c++src"; tagText = "C++ Source"; }
                    if(ext === 'java') { modeName = "text/x-java"; tagText = "Java Runtime"; }
                    
                    document.getElementById('currentLangTag').innerText = tagText;
                    editor.setOption("mode", modeName);
                    
                    toggleSidebar();
                    renderFileList();
                };
                list.appendChild(div);
            });
        }

        function createNewFile() {
            const name = prompt("Nhập tên file kèm đuôi mở rộng (VD: app.py, test.html):");
            if (name) {
                if(fileSystem.some(f => f.name === name)) return alert("File này đã tồn tại!");
                fileSystem.push({ name: name, type: 'file', content: '' });
                renderFileList();
            }
        }

        function copyCode() { 
            navigator.clipboard.writeText(editor.getValue()); 
            alert("Đã copy mã nguồn thành công!"); 
        }
        
        function insertChar(char) { 
            editor.getDoc().replaceRange(char, editor.getDoc().getCursor()); 
            editor.focus(); 
        }
        
        function handleTabShortcut() { 
            editor.getDoc().replaceRange("    ", editor.getDoc().getCursor()); 
            editor.focus(); 
        }

        // TÍNH NĂNG MỞ SỰ KIỆN QUA TRÌNH DUYỆT THẬT ĐỂ ĐĂNG NHẬP (FIX LỖI OAUTH)
        function openInRealBrowser() {
            const ext = currentFile.split('.').pop().toLowerCase();
            if (ext === 'html' || ext === 'htm') {
                const newWindow = window.open();
                newWindow.document.write(editor.getValue());
                newWindow.document.close();
            } else {
                alert("Tính năng này chỉ hỗ trợ để chạy view thực tế cho file HTML!");
            }
        }

        // HÀM CHẠY CODE THÔNG MINH - HỖ TRỢ ĐA NGÔN NGỮ + NHẬP TERMINAL
        function runCode() {
            saveCurrentFileContent(); 
            
            const currentCode = editor.getValue();
            const ext = currentFile.split('.').pop().toLowerCase();
            
            const overlay = document.getElementById('previewOverlay');
            const iframe = document.getElementById('webPreviewFrame');
            const safariBar = document.getElementById('safariBar');
            const terminalContainer = document.getElementById('terminalContainer');
            const consoleOut = document.getElementById('consoleOutput');
            const inputStdin = document.getElementById('terminalStdin').value; // Lấy dữ liệu người dùng nhập vào terminal
            
            overlay.classList.add('open');
            
            // TRƯỜNG HỢP 1: Chạy trực tiếp file giao diện Web tĩnh (DUYỆT SAFARI GIẢ LẬP)
            if (ext === 'html' || ext === 'htm') {
                iframe.style.display = "block";
                safariBar.style.display = "flex"; 
                terminalContainer.style.display = "none";
                document.getElementById('safariUrlText').innerText = "safari://localhost/" + currentFile;
                
                const doc = iframe.contentWindow.document;
                doc.open();
                doc.write(currentCode);
                doc.close();
            } 
            // TRƯỜNG HỢP 2: Chạy Terminal cho Backend (Python, C++, Java...) qua Sandbox
            else {
                iframe.style.display = "none";
                safariBar.style.display = "none";
                terminalContainer.style.display = "flex";
                consoleOut.innerText = "⏳ Đang kết nối server Sandbox...\nĐang truyền biến STDIN đầu vào và biên dịch...";

                let languageId = 71; // Python 3 mặc định
                if (ext === 'py') languageId = 71;
                if (ext === 'cpp') languageId = 54;
                if (ext === 'c') languageId = 50;
                if (ext === 'java') languageId = 62;

                // Gửi request kèm theo stdin nhập từ thanh điều khiển
                fetch('https://judge0-ce.p.rapidapi.com/submissions?base64_encoded=false&wait=true', {
                    method: 'POST',
                    headers: {
                        'content-type': 'application/json',
                        'x-rapidapi-key': 'd99965908emshb944f2d7fa85b13p194bf0jsn3b9a117b3d39',
                        'x-rapidapi-host': 'judge0-ce.p.rapidapi.com'
                    },
                    body: JSON.stringify({
                        source_code: currentCode,
                        language_id: languageId,
                        stdin: inputStdin // Truyền trực tiếp dữ liệu ô input vào luồng đọc hệ thống
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.stdout) {
                        consoleOut.innerText = data.stdout;
                    } else if (data.stderr) {
                        consoleOut.innerText = "❌ LỖI LOG CÚ PHÁP:\n" + data.stderr;
                    } else if (data.compile_output) {
                        consoleOut.innerText = "❌ LỖI BIÊN DỊCH:\n" + data.compile_output;
                    } else {
                        consoleOut.innerText = "Chương trình thực thi thành công (Không có phản hồi xuất dữ liệu terminal).";
                    }
                })
                .catch(err => {
                    consoleOut.innerText = "❌ Lỗi kết nối Sandbox: " + err.message + "\nHãy bấm RUN thử lại.";
                });
            }
        }

        function closePreview() {
            document.getElementById('previewOverlay').classList.remove('open');
            editor.focus();
        }
    </script>
</body>
</html>
