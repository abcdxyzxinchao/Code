<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spck Workspace Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #07090e;
            --sidebar-bg: #0b111e;
            --editor-bg: #0d1222;
            --top-bar-bg: #090d18;
            --tab-active: #0d1222;
            --tab-inactive: #05080f;
            --accent-color: #3b82f6;
            --text-main: #ffffff;
            --text-muted: #64748b;
            --border-color: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100dvh;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            position: fixed;
        }

        .app-container {
            width: 100vw;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 1. THANH NAV TRÊN CÙNG */
        .top-nav {
            height: 48px;
            background-color: var(--top-bar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 50;
        }

        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-icon {
            font-size: 18px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }
        .nav-icon:hover, .nav-icon.active { color: var(--text-main); }
        
        .btn-run {
            color: #10b981;
            font-size: 20px;
            cursor: pointer;
        }

        /* 2. KHU VỰC THÂN CHÍNH */
        .main-content {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
            height: calc(100dvh - 48px);
        }

        /* SIDEBAR QUẢN LÝ TỆP TIN */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(0);
        }

        .sidebar.collapsed {
            transform: translateX(-260px);
        }

        .sidebar-header {
            padding: 14px 16px;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .file-actions {
            display: flex;
            gap: 14px;
            font-size: 14px;
        }
        .file-actions i { cursor: pointer; color: var(--text-muted); }
        .file-actions i:hover { color: var(--text-main); }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        /* ĐỊNH DẠNG CÁC PHẦN TỬ TRONG CÂY FILE */
        .tree-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            color: #cbd5e1;
            border-radius: 4px;
            margin: 2px 6px;
        }
        .tree-item:hover {
            background-color: rgba(255, 255, 255, 0.04);
        }
        .tree-item.active {
            background-color: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }
        .tree-item.selected-folder {
            background-color: rgba(245, 158, 11, 0.1);
            border: 1px dashed rgba(245, 158, 11, 0.4);
        }
        
        .tree-item-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tree-item .item-icon { width: 16px; text-align: center; font-size: 14px; }
        .tree-item .fa-ellipsis-vertical {
            color: var(--text-muted);
            padding: 4px 8px;
            cursor: pointer;
        }
        .tree-item .fa-ellipsis-vertical:hover { color: #fff; }
        
        /* Màu biểu tượng tệp tin mở rộng */
        .fa-folder, .fa-folder-open { color: #f59e0b; }
        .fa-java { color: #ea2d2e; }
        .fa-html5 { color: #e34c26; }
        .fa-js { color: #f7df1e; }
        .fa-php { color: #777bb4; }
        .fa-css3-alt { color: #2196f3; }
        .fa-file-code { color: #94a3b8; }

        /* KHÔNG GIAN EDITOR */
        .editor-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--editor-bg);
            overflow: hidden;
            position: relative;
            margin-left: 260px;
            transition: margin-left 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar.collapsed + .editor-zone {
            margin-left: 0;
        }

        /* LỚP PHỦ KHÓA CODE VÀ ĐÓNG MENU KHI CHẠM RA NGOÀI */
        .editor-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.2);
            z-index: 90;
            display: none;
        }

        .tabs-bar {
            height: 38px;
            background-color: var(--tab-inactive);
            display: flex;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
        }
        .tabs-bar::-webkit-scrollbar { display: none; }

        .tab-item {
            height: 100%;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            background-color: var(--tab-inactive);
            border-right: 1px solid var(--border-color);
            cursor: pointer;
            white-space: nowrap;
        }
        .tab-item.active {
            background-color: var(--tab-active);
            color: var(--text-main);
            border-bottom: 2px solid var(--accent-color);
        }

        .editor-container-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
        }
        #editor-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
        }

        /* CONTEXT MENU TỆP TIN */
        .file-context-menu {
            position: absolute;
            background-color: #111625;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            width: 160px;
            z-index: 150;
            padding: 4px 0;
        }
        .context-menu-item {
            padding: 10px 14px;
            font-size: 13px;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .context-menu-item:hover {
            background-color: var(--accent-color);
            color: white;
        }

        /* CONTEXT MENU GÕ CODE */
        .custom-context-menu {
            position: absolute;
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: none;
            z-index: 120;
            padding: 4px;
        }
        .menu-btn {
            background: none; border: none; color: white;
            padding: 6px 12px; font-size: 12px; cursor: pointer;
        }
        .menu-btn:hover { background-color: var(--accent-color); }

        /* GIAO DIỆN CHẠY KẾT QUẢ SẠCH TRẮNG NGUYÊN BẢN */
        .output-panel {
            position: absolute;
            top: 0; right: -100%;
            width: 100%; height: 100%;
            background-color: #ffffff; z-index: 200;
            transition: right 0.28s cubic-bezier(0.1, 0.9, 0.2, 1);
            display: flex; flex-direction: column;
        }
        .output-panel.open { right: 0; }
        .output-header {
            height: 48px; background: var(--top-bar-bg);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; border-bottom: 1px solid var(--border-color);
            color: #fff;
        }
        .output-body { flex: 1; position: relative; background-color: #ffffff; }
        #preview-iframe { width: 100%; height: 100%; border: none; background: #ffffff; }
        #terminal-box { width: 100%; height: 100%; padding: 16px; font-family: monospace; color: #00ff00; background: #000000; overflow-y: auto; white-space: pre-wrap; display: none; }

        .empty-screen-msg {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            pointer-events: none;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="top-nav">
            <div class="nav-left">
                <i class="fa-solid fa-bars nav-icon active" id="btn-toggle-menu"></i>
                <i class="fa-solid fa-folder nav-icon"></i>
                <i class="fa-solid fa-code nav-icon"></i>
            </div>
            <div class="nav-right">
                <i class="fa-solid fa-file-zipper nav-icon" id="btn-export-project" title="Export Project (ZIP)"></i>
                <i class="fa-solid fa-play btn-run" id="btn-run-code"></i>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar" id="sidebar-menu">
                <div class="sidebar-header">
                    <span>FILES</span>
                    <div class="file-actions">
                        <i class="fa-solid fa-file-circle-plus" id="new-file-trigger" title="Tạo file"></i>
                        <i class="fa-solid fa-folder-plus" id="new-folder-trigger" title="Tạo thư mục"></i>
                    </div>
                </div>
                <div class="file-tree" id="file-tree-container"></div>
            </div>

            <div class="editor-zone" id="editor-zone-block">
                <div class="editor-overlay" id="click-outside-overlay"></div>

                <div class="tabs-bar" id="tabs-container"></div>

                <div class="editor-container-wrapper">
                    <div id="editor-container"></div>
                    <div class="empty-screen-msg" id="empty-msg">
                        Không có file nào đang mở.<br>Hãy nhấn biểu tượng tạo file bên trái để bắt đầu lập trình.
                    </div>
                </div>

                <div class="custom-context-menu" id="context-popup">
                    <button class="menu-btn" onclick="execAction('all')">Select All</button>
                    <button class="menu-btn" onclick="execAction('copy')">Copy</button>
                    <button class="menu-btn" onclick="execAction('paste')">Paste</button>
                </div>
            </div>

            <div class="output-panel" id="output-screen">
                <div class="output-header">
                    <span id="output-type" style="font-weight: 500;">Live Preview</span>
                    <button style="background:none; border:none; color:white; font-size:14px; cursor:pointer;" id="btn-close-output">✕ ĐÓNG</button>
                </div>
                <div class="output-body">
                    <iframe id="preview-iframe"></iframe>
                    <div id="terminal-box"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="file-context-menu" id="file-interaction-menu">
        <div class="context-menu-item" id="opt-export-single"><i class="fa-solid fa-download"></i> Export File</div>
        <div class="context-menu-item" id="opt-rename-file"><i class="fa-solid fa-pen"></i> Rename</div>
        <div class="context-menu-item" id="opt-delete-file" style="color:#ff453a;"><i class="fa-solid fa-trash"></i> Delete</div>
    </div>

    <script>
        let editor;
        
        // CẤU TRÚC ĐỐI TƯỢNG FILE GỐC (HOÀN TOÀN TRỐNG ĐỂ TỰ DO KHỞI TẠO)
        let projectFileSystem = {
            type: 'folder',
            name: 'root',
            children: {}
        };

        let openedTabs = []; 
        let activeFilePath = null; // Đường dẫn dạng chuỗi phân tách bởi dấu gạch chéo xuôi '/'
        let selectedTargetId = null; // Lưu thư mục đang được chọn để tạo tệp tin con lồng nhau
        let targetMenuPath = null;

        const langMapping = { 'html': 'html', 'css': 'css', 'js': 'javascript', 'java': 'java', 'php': 'php', 'swift': 'swift' };

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: '',
                language: 'plaintext',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 15,
                renderIndentGuides: true,
                minimap: { enabled: false }
            });

            updateEditorVisibility();
            setupLongPressMenu();
        });

        // ĐÓNG MỞ SIDEBAR CHẶN CODE VÀ CHẠM NGOÀI TỰ ĐỘNG THU GỌN
        const sidebar = document.getElementById('sidebar-menu');
        const overlay = document.getElementById('click-outside-overlay');

        function toggleSidebar(open) {
            if (open) {
                sidebar.classList.remove('collapsed');
                overlay.style.display = 'block'; // Khóa tương tác vùng viết code
            } else {
                sidebar.classList.add('collapsed');
                overlay.style.display = 'none'; // Tháo khóa, cho gõ code bình thường
            }
            setTimeout(() => { if(editor) editor.layout(); }, 260);
        }

        document.getElementById('btn-toggle-menu').addEventListener('click', function(e) {
            e.stopPropagation();
            const isOpen = !sidebar.classList.contains('collapsed');
            toggleSidebar(!isOpen);
        });

        // Ấn vào vùng trống bất kỳ nằm ngoài bảng điều khiển là tự động đóng
        overlay.addEventListener('click', function() {
            toggleSidebar(false);
        });

        function updateEditorVisibility() {
            const msg = document.getElementById('empty-msg');
            if(!activeFilePath) {
                msg.style.display = 'block';
                if(editor) editor.getContainerNode().style.opacity = '0';
            } else {
                msg.style.display = 'none';
                if(editor) editor.getContainerNode().style.opacity = '1';
            }
        }

        // ĐIỀU HƯỚNG TÌM ĐỐI TƯỢNG THEO ĐƯỜNG DẪN MẠNG LƯỚI TỰ DO
        function getNodeByPath(pathStr) {
            if (!pathStr) return null;
            const parts = pathStr.split('/');
            let current = projectFileSystem;
            for (let part of parts) {
                if (current && current.children && current.children[part]) {
                    current = current.children[part];
                } else {
                    return null;
                }
            }
            return current;
        }

        // TẠO FILE MỚI LỒNG NHAU THEO THƯ MỤC ĐANG CHỌN TỐI ƯU CỦA SPCK
        document.getElementById('new-file-trigger').addEventListener('click', function(e) {
            e.stopPropagation();
            const name = prompt("Nhập tên tệp tin mới (ví dụ: index.html, main.js):");
            if (!name) return;

            let parentNode = projectFileSystem;
            let basePath = "";
            
            if (selectedTargetId) {
                let targetNode = getNodeByPath(selectedTargetId);
                if (targetNode && targetNode.type === 'folder') {
                    parentNode = targetNode;
                    basePath = selectedTargetId + "/";
                }
            }

            if (parentNode.children[name]) {
                alert("Tên tệp tin đã tồn tại trong thư mục này!");
                return;
            }

            parentNode.children[name] = {
                type: 'file',
                name: name,
                content: name.endsWith('.html') ? `<!DOCTYPE html>\n<html>\n<head>\n<meta charset="utf-8">\n</head>\n<body>\n  \n</body>\n</html>` : `// Mã nguồn ${name}\n`
            };

            const newPath = basePath + name;
            renderFileTree();
            openFile(newPath);
        });

        // TẠO THƯ MỤC CON LỒNG NHAU KHÔNG GIỚI HẠN
        document.getElementById('new-folder-trigger').addEventListener('click', function(e) {
            e.stopPropagation();
            const name = prompt("Nhập tên thư mục mới:");
            if (!name) return;

            let parentNode = projectFileSystem;
            let basePath = "";

            if (selectedTargetId) {
                let targetNode = getNodeByPath(selectedTargetId);
                if (targetNode && targetNode.type === 'folder') {
                    parentNode = targetNode;
                    basePath = selectedTargetId + "/";
                }
            }

            if (parentNode.children[name]) {
                alert("Thư mục đã tồn tại!");
                return;
            }

            parentNode.children[name] = {
                type: 'folder',
                name: name,
                children: {},
                isOpen: true
            };

            renderFileTree();
        });

        // DỰNG CÂY THƯ MỤC PHỨC HỢP ĐA TẦNG DỰA TRÊN ĐỆ QUY ĐỒNG BỘ CẤU TRÚC ĐỒ HỌA
        function renderFileTree() {
            const container = document.getElementById('file-tree-container');
            container.innerHTML = '';

            function buildTreeHTML(node, currentPath, depth) {
                let html = '';
                Object.keys(node.children).sort().forEach(key => {
                    const child = node.children[key];
                    const thisPath = currentPath ? `${currentPath}/${key}` : key;
                    const paddingLeft = depth * 16 + 12;

                    if (child.type === 'folder') {
                        const isSelected = thisPath === selectedTargetId ? 'selected-folder' : '';
                        const folderIcon = child.isOpen ? 'fa-folder-open' : 'fa-folder';
                        
                        html += `
                            <div class="tree-item ${isSelected}" style="padding-left: ${paddingLeft}px;" onclick="handleFolderClick(event, '${thisPath}')">
                                <div class="tree-item-left">
                                    <i class="fa-solid ${folderIcon} item-icon"></i>
                                    <span style="font-weight: 500;">${child.name}</span>
                                </div>
                                <i class="fa-solid fa-ellipsis-vertical" onclick="triggerFileMenu(event, '${thisPath}')"></i>
                            </div>
                        `;
                        
                        if (child.isOpen) {
                            html += buildTreeHTML(child, thisPath, depth + 1);
                        }
                    } else {
                        const ext = child.name.split('.').pop().toLowerCase();
                        let iconClass = "fa-solid fa-file-code";
                        if(ext === 'html') iconClass = "fa-brands fa-html5";
                        else if(ext === 'js') iconClass = "fa-brands fa-js";
                        else if(ext === 'css') iconClass = "fa-brands fa-css3-alt";
                        else if(ext === 'java') iconClass = "fa-brands fa-java";
                        else if(ext === 'php') iconClass = "fa-brands fa-php";

                        const isActive = thisPath === activeFilePath ? 'active' : '';

                        html += `
                            <div class="tree-item ${isActive}" style="padding-left: ${paddingLeft}px;" onclick="handleFileClick(event, '${thisPath}')">
                                <div class="tree-item-left">
                                    <i class="${iconClass} item-icon"></i>
                                    <span>${child.name}</span>
                                </div>
                                <i class="fa-solid fa-ellipsis-vertical" onclick="triggerFileMenu(event, '${thisPath}')"></i>
                            </div>
                        `;
                    }
                });
                return html;
            }

            container.innerHTML = buildTreeHTML(projectFileSystem, "", 0);
            updateEditorVisibility();
        }

        function handleFolderClick(e, pathStr) {
            e.stopPropagation();
            let node = getNodeByPath(pathStr);
            if (node) {
                node.isOpen = !node.isOpen;
                // Click chọn thư mục để đánh dấu tiêu điểm tạo file con lồng bên trong
                selectedTargetId = (selectedTargetId === pathStr) ? null : pathStr;
                renderFileTree();
            }
        }

        function handleFileClick(e, pathStr) {
            e.stopPropagation();
            openFile(pathStr);
        }

        // THỰC THI MỞ FILE VÀ ĐỒNG BỘ HOÁ LÊN THANH TAB ĐẦU TRANG
        function openFile(pathStr) {
            if (activeFilePath && editor) {
                let lastNode = getNodeByPath(activeFilePath);
                if (lastNode) lastNode.content = editor.getValue();
            }

            activeFilePath = pathStr;
            if (!openedTabs.includes(pathStr)) {
                openedTabs.push(pathStr);
            }

            let currentNode = getNodeByPath(pathStr);
            if (currentNode) {
                const ext = currentNode.name.split('.').pop().toLowerCase();
                editor.setValue(currentNode.content);
                monaco.editor.setModelLanguage(editor.getModel(), langMapping[ext] || 'plaintext');
            }

            renderTabs();
            renderFileTree();
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';

            openedTabs.forEach(pathStr => {
                const parts = pathStr.split('/');
                const fileName = parts[parts.length - 1];
                const tab = document.createElement('div');
                tab.className = `tab-item ${pathStr === activeFilePath ? 'active' : ''}`;
                tab.innerHTML = `<span>${fileName}</span>`;
                tab.onclick = () => openFile(pathStr);
                container.appendChild(tab);
            });
        }

        // GỌI BẢNG MENU BA CHẤM ĐỘC LẬP TỪNG TỆP TIN
        function triggerFileMenu(e, pathStr) {
            e.stopPropagation();
            targetMenuPath = pathStr;
            const menu = document.getElementById('file-interaction-menu');
            menu.style.display = 'flex';
            menu.style.left = (e.clientX - 140) + 'px';
            menu.style.top = e.clientY + 'px';
        }

        document.addEventListener('click', function() {
            document.getElementById('file-interaction-menu').style.display = 'none';
        });

        // XỬ LÝ SỰ KIỆN CONTEXT MENU (EXPORT, RENAME, DELETE)
        document.getElementById('opt-export-single').addEventListener('click', function() {
            if (!targetMenuPath) return;
            let node = getNodeByPath(targetMenuPath);
            if (!node || node.type !== 'file') return alert("Chỉ hỗ trợ xuất file đơn lẻ!");
            
            const blob = new Blob([node.content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = node.name;
            a.click();
        });

        document.getElementById('opt-rename-file').addEventListener('click', function() {
            if (!targetMenuPath) return;
            let node = getNodeByPath(targetMenuPath);
            if (!node) return;

            const newName = prompt("Nhập tên mới:", node.name);
            if (!newName || newName === node.name) return;

            // Tiến hành cập nhật nút cấu trúc cây dữ liệu mẹ
            const parts = targetMenuPath.split('/');
            const oldName = parts.pop();
            const parentPath = parts.join('/');
            let parentNode = parentPath ? getNodeByPath(parentPath) : projectFileSystem;

            if (parentNode.children[newName]) return alert("Tên này đã tồn tại!");

            parentNode.children[newName] = parentNode.children[oldName];
            parentNode.children[newName].name = newName;
            delete parentNode.children[oldName];

            const newPath = parentPath ? `${parentPath}/${newName}` : newName;

            if (activeFilePath === targetMenuPath) activeFilePath = newPath;
            let idx = openedTabs.indexOf(targetMenuPath);
            if (idx !== -1) openedTabs[idx] = newPath;

            if (selectedTargetId === targetMenuPath) selectedTargetId = newPath;

            renderFileTree();
            renderTabs();
        });

        document.getElementById('opt-delete-file').addEventListener('click', function() {
            if (!targetMenuPath || !confirm("Bạn có chắc chắn muốn xóa mục này không?")) return;

            const parts = targetMenuPath.split('/');
            const oldName = parts.pop();
            const parentPath = parts.join('/');
            let parentNode = parentPath ? getNodeByPath(parentPath) : projectFileSystem;

            delete parentNode.children[oldName];

            // Dọn sạch mảng trạng thái lưu trữ tab đang mở
            openedTabs = openedTabs.filter(t => !t.startsWith(targetMenuPath));
            
            if (activeFilePath && activeFilePath.startsWith(targetMenuPath)) {
                activeFilePath = openedTabs.length > 0 ? openedTabs[0] : null;
            }
            if (selectedTargetId && selectedTargetId.startsWith(targetMenuPath)) {
                selectedTargetId = null;
            }

            if (activeFilePath) openFile(activeFilePath);
            else {
                renderFileTree();
                renderTabs();
            }
        });

        // XUẤT NÉN ZIP TOÀN BỘ PROJECT LỒNG NHAU ĐA CẤP
        document.getElementById('btn-export-project').addEventListener('click', function() {
            if (Object.keys(projectFileSystem.children).length === 0) return alert("Không có tệp tin nào để đóng gói xuất khẩu!");
            
            const rootName = prompt("Nhập tên dự án để xuất gói ZIP:", "SpckProjectAI");
            if (!rootName) return;

            const zip = new JSZip();

            function addToZip(node, currentZipFolder) {
                Object.keys(node.children).forEach(key => {
                    const child = node.children[key];
                    if (child.type === 'folder') {
                        const newZipFolder = currentZipFolder.folder(child.name);
                        addToZip(child, newZipFolder);
                    } else {
                        currentZipFolder.file(child.name, child.content);
                    }
                });
            }

            const mainProjectFolder = zip.folder(rootName);
            addToZip(projectFileSystem, mainProjectFolder);

            zip.generateAsync({ type: 'blob' }).then(function(content) {
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${rootName}.zip`;
                a.click();
            });
        });

        // GIAO DIỆN CHẠY CODE TRẮNG SẠCH SẼ - KHÔNG CHỨA BẤT CỨ MÃ CỐ ĐỊNH NÀO
        document.getElementById('btn-run-code').addEventListener('click', async function() {
            if (!activeFilePath) return alert("Vui lòng mở một file để chạy chương trình!");

            if (editor) {
                let currentNode = getNodeByPath(activeFilePath);
                if (currentNode) currentNode.content = editor.getValue();
            }

            const panel = document.getElementById('output-screen');
            const iframe = document.getElementById('preview-iframe');
            const terminal = document.getElementById('terminal-box');
            const typeText = document.getElementById('output-type');
            
            let activeNode = getNodeByPath(activeFilePath);

            panel.classList.add('open');

            if (activeNode.name.endsWith('.html')) {
                typeText.innerText = "Browser Preview (HTML)";
                iframe.style.display = "block";
                terminal.style.display = "none";
                
                // Trả về vùng trắng nguyên bản sạch sẽ và nạp mã code trực tiếp
                iframe.srcdoc = ""; 
                setTimeout(() => {
                    iframe.srcdoc = activeNode.content;
                }, 10);
            } else {
                typeText.innerText = "Console Terminal Output";
                iframe.style.display = "none";
                terminal.style.display = "block";
                terminal.innerText = ">>> Đang thực thi biên dịch trực tuyến...\n";

                let ext = activeNode.name.split('.').pop().toLowerCase();
                let apiLang = "py"; let apiVer = "3.10.0";
                if(ext === 'js') { apiLang = "js"; apiVer = "18.15.0"; }
                if(ext === 'java') { apiLang = "java"; apiVer = "15.0.2"; }
                if(ext === 'php') { apiLang = "php"; apiVer = "8.2.3"; }

                try {
                    const res = await fetch('https://emkc.org/api/v2/piston/execute', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            language: apiLang, version: apiVer,
                            files: [{ content: activeNode.content }]
                        })
                    });
                    const data = await res.json();
                    if(data.run) {
                        terminal.innerText = data.run.stderr ? `[Lỗi hệ thống]:\n${data.run.stderr}` : data.run.stdout;
                    }
                } catch(e) {
                    terminal.innerText = "Lỗi kết nối máy chủ Cloud.";
                }
            }
        });

        document.getElementById('btn-close-output').addEventListener('click', function() {
            document.getElementById('output-screen').classList.remove('open');
        });

        // POPUP PHỤ TRỢ (SELECT ALL, COPY, PASTE)
        function setupLongPressMenu() {
            const area = document.getElementById('editor-container');
            const popup = document.getElementById('context-popup');

            area.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                popup.style.display = 'block';
                popup.style.left = e.clientX + 'px';
                popup.style.top = (e.clientY - 35) + 'px';
            });

            document.addEventListener('click', function(e) {
                if(!popup.contains(e.target)) popup.style.display = 'none';
            });
        }

        function execAction(type) {
            if(type === 'all') {
                editor.focus();
                editor.setSelection(editor.getModel().getFullModelRange());
            } else if(type === 'copy') {
                const txt = editor.getModel().getValueInRange(editor.getSelection());
                navigator.clipboard.writeText(txt);
            } else if(type === 'paste') {
                navigator.clipboard.readText().then(t => {
                    const sel = editor.getSelection();
                    const r = new monaco.Range(sel.startLineNumber, sel.startColumn, sel.endLineNumber, sel.endColumn);
                    editor.executeEdits("", [{ range: r, text: t }]);
                });
            }
            document.getElementById('context-popup').style.display = 'none';
        }
    </script>
</body>
